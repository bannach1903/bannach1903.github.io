<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Teste Login</title>
<style>
body{background:#0f0f0f;color:white;font-family:Arial;text-align:center;}
input,button{padding:10px;margin:10px;border-radius:8px;border:none;font-size:16px;}
button{background:red;color:white;font-weight:bold;cursor:pointer;}
button:hover{opacity:0.8;}
</style>
</head>
<body>

<h2>🔥 LOGIN TESTE 🔥</h2>
<input type="password" id="keyInput" placeholder="Digite sua key">
<button type="button" id="btnLogin">Entrar</button>

<div id="painel" style="display:none;">
  <h2>Painel Funcionando!</h2>
  <p>Se você está vendo isso, a key funcionou!</p>
</div>

<script>
const minhaKey = "X7bP9kL2Qf";

document.getElementById("btnLogin").addEventListener("click", () => {
  const key = document.getElementById("keyInput").value.trim();
  if(key === minhaKey){
    alert("Key correta!");
    document.getElementById("painel").style.display = "block";
  } else {
    alert("Key incorreta!");
  }
});
</script>

</body>
</html>
