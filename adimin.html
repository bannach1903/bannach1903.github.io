<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel Admin - FF PRO (Local)</title>
<style>
body{background:#0f0f0f;color:white;font-family:Arial;text-align:center;}
input,button{padding:10px;margin:10px;border-radius:8px;border:none;}
button{background:red;color:white;font-weight:bold;cursor:pointer;}
button:hover{opacity:0.8;}
.box{background:#1a1a1a;padding:15px;margin:10px;border-radius:10px;}
#login-section{padding:50px;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-section">
  <h2>🔥 ACESSO ADMIN 🔥</h2>
  <input type="password" id="keyInput" placeholder="Digite sua key">
  <!-- ADICIONE type="button" PARA GARANTIR QUE NÃO ENVIA FORM -->
  <button type="button" onclick="verificarKey()">Entrar</button>
</div>

<!-- PAINEL ADMIN -->
<div id="painel" style="display:none;">
  <h2>🔥 PAINEL ADMIN 🔥</h2>

  <div class="box">
    <h3>Gerar Nova Key</h3>
    <input id="dias" placeholder="Dias (ex: 30)">
    <button type="button" onclick="criarKey()">GERAR KEY</button>
    <p id="novaKey"></p>
  </div>

  <div class="box">
    <h3>Keys Criadas</h3>
    <div id="lista"></div>
  </div>
</div>

<script>
// 🔑 KEY DE LOGIN
const minhaKey = "X7bP9kL2Qf"; // ← Key para acessar o painel

function verificarKey(){
  const key = document.getElementById("keyInput").value.trim(); // remove espaços extras
  if(key === minhaKey){
    document.getElementById("login-section").style.display = "none";
    document.getElementById("painel").style.display = "block";
    carregarKeys();
  } else {
    alert("Key incorreta!");
  }
}

// 🔑 GERAR KEY ALEATÓRIA
function gerarKey(){
  return "FFPRO-" +
    Math.random().toString(36).substring(2,6).toUpperCase() + "-" +
    Math.random().toString(36).substring(2,6).toUpperCase();
}

// 🔥 CRIAR KEY (LOCALSTORAGE)
function criarKey(){
  let dias = parseInt(document.getElementById("dias").value);
  if(!dias){
    alert("Digite os dias");
    return;
  }

  let key = gerarKey();
  let expira = Date.now() + (dias * 86400000); // validade em ms

  let keys = JSON.parse(localStorage.getItem("keys")) || [];

  keys.push({
    id: key,
    status: "ativo",
    expira: expira,
    criado_em: Date.now()
  });

  localStorage.setItem("keys", JSON.stringify(keys));
  document.getElementById("novaKey").innerText = "KEY: " + key;
  carregarKeys();
}

// 📋 LISTAR KEYS
function carregarKeys(){
  let lista = document.getElementById("lista");
  lista.innerHTML = "";

  let keys = JSON.parse(localStorage.getItem("keys")) || [];

  keys.forEach(k => {
    let cor = k.status === "ativo" ? "lime" : "red";
    lista.innerHTML += `
      <div class="box">
        🔑 ${k.id}<br>
        Status: <span style="color:${cor}">${k.status}</span><br>
        Expira: ${new Date(k.expira).toLocaleDateString()}<br>
      </div>
    `;
  });
}
</script>

</body>
</html>
