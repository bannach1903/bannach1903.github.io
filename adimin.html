<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel Admin Funcional</title>
<style>
body {background:#0f0f0f; color:white; font-family:Arial; text-align:center; padding:30px;}
input, button {padding:10px; margin:10px; border-radius:8px; border:none; font-size:16px;}
button {background:red; color:white; font-weight:bold; cursor:pointer;}
button:hover {opacity:0.8;}
.box {background:#1a1a1a; padding:15px; margin:10px; border-radius:10px;}
#painel {display:none;}
</style>
</head>
<body>

<h2>🔥 PAINEL ADMIN 🔥</h2>

<div id="login-section">
  <input type="password" id="keyInput" placeholder="Digite a Key de admin">
  <button type="button" id="btnLogin">Entrar</button>
</div>

<div id="painel">
  <div class="box">
    <h3>Gerar Nova Key Infinita</h3>
    <button id="btnGerarKey">GERAR KEY</button>
    <p id="novaKey"></p>
  </div>

  <div class="box">
    <h3>Keys Criadas</h3>
    <div id="lista"></div>
  </div>
</div>

<script>
const adminKey = "X7bP9kL2Qf"; // Key de admin

// Função de login
document.getElementById("btnLogin").addEventListener("click", () => {
    const value = document.getElementById("keyInput").value.trim();
    if(value === adminKey){
        alert("Key correta! Entrando no painel...");
        document.getElementById("login-section").style.display = "none";
        document.getElementById("painel").style.display = "block";
        carregarKeys();
    } else {
        alert("Key incorreta!");
    }
});

// Função para gerar keys infinitas
function gerarKey(){
    return "FFPRO-" + Math.random().toString(36).substring(2,6).toUpperCase() + "-" + Math.random().toString(36).substring(2,6).toUpperCase();
}

// Botão gerar key
document.getElementById("btnGerarKey").addEventListener("click", () => {
    const key = gerarKey();
    const expira = null; // infinita
    let keys = JSON.parse(localStorage.getItem("keys")) || [];
    keys.push({id:key, status:"ativo", expira:expira, criado_em:Date.now()});
    localStorage.setItem("keys", JSON.stringify(keys));
    document.getElementById("novaKey").innerText = "KEY: " + key;
    carregarKeys();
});

// Função para listar keys
function carregarKeys(){
    const lista = document.getElementById("lista");
    lista.innerHTML = "";
    const keys = JSON.parse(localStorage.getItem("keys")) || [];
    keys.forEach(k => {
        const cor = k.status === "ativo" ? "lime" : "red";
        lista.innerHTML += `
          <div class="box">
            🔑 ${k.id}<br>
            Status: <span style="color:${cor}">${k.status}</span><br>
            Expira: ${k.expira ? new Date(k.expira).toLocaleDateString() : '∞'}<br>
          </div>
        `;
    });
}
</script>

</body>
</html>
