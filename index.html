<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sensibilidade Mobilador</title>
<style>
body{margin:0;font-family:Arial;background:#0f0f0f;color:white;text-align:center;}
.container{padding:20px;}
select,input{width:90%;margin:10px;padding:10px;border-radius:10px;border:none;font-size:16px;}
button{width:90%;padding:15px;margin:10px;border:none;border-radius:10px;font-size:16px;font-weight:bold;background:red;color:white;}
.resultado{background:#1a1a1a;padding:15px;margin-top:15px;border-radius:10px;}
h2{margin-bottom:0;}
</style>
</head>
<body>
<div class="container">
<h2>🎮 Gerador de Sensibilidade Mobilador 🎮</h2>

<p>Escolha o aparelho:</p>
<select id="celular"></select>

<p>Horizontal do Jogo: <span id="horizValor">50</span></p>
<input type="range" min="10" max="100" value="50" id="horiz">

<p>Vertical do Jogo: <span id="vertValor">50</span></p>
<input type="range" min="10" max="100" value="50" id="vert">

<button onclick="gerarMobilador()">GERAR SENSI</button>
<button onclick="copiarMobilador()">COPIAR</button>

<div class="resultado" id="resultadoMobilador">
Resultado aparecerá aqui...
</div>
</div>

<script>
// Lista de aparelhos
const celulares=[
  {nome:"Samsung A10", tipo:"fraco"},
  {nome:"Motorola G23", tipo:"medio"},
  {nome:"Redmi Note 13 4G", tipo:"medio"},
  {nome:"POCO X3 Pro", tipo:"forte"},
  {nome:"iPhone 14", tipo:"forte"}
];

// Carregar select
const select=document.getElementById("celular");
celulares.forEach(cel=>{
  let option=document.createElement("option");
  option.value=cel.tipo;
  option.textContent=cel.tipo==="fraco"?"🔻 "+cel.nome:cel.tipo==="medio"?"⚖️ "+cel.nome:"🚀 "+cel.nome;
  select.appendChild(option);
});

// Atualizar sliders
horiz.oninput=()=>horizValor.innerText=horiz.value;
vert.oninput=()=>vertValor.innerText=vert.value;

// Gerar mobilador
function gerarMobilador(){
  let tipo=select.value;
  let horiz=parseInt(horiz.value);
  let vert=parseInt(vert.value);

  // Ajuste por tipo de aparelho
  let ajusteTipo = tipo==="fraco"?0.9:tipo==="medio"?1.0:1.1;

  let geral=(horiz+vert)/2;
  let mouseGG=Math.round(horiz*1.2*ajusteTipo);
  let mousePanda=Math.round(horiz*1.1*ajusteTipo);
  let mousePro=Math.round(horiz*1.15*ajusteTipo);
  let celular=Math.round(vert*ajusteTipo);

  document.getElementById("resultadoMobilador").innerHTML=`
    🤖 Sensibilidade Mobilador 🤖<br><br>
    Horizontal do Jogo: ${horiz}<br>
    Vertical do Jogo: ${vert}<br>
    Geral: ${Math.round(geral)}<br><br>
    🔹 GG MOUSE PRO: ${mouseGG} (Mouse), ${celular} (Celular)<br>
    🔹 PANDA MOUSE PRO: ${mousePanda} (Mouse), ${celular} (Celular)<br>
    🔹 MOUSE PRO: ${mousePro} (Mouse), ${celular} (Celular)
  `;
}

// Copiar resultado
function copiarMobilador(){
  navigator.clipboard.writeText(document.getElementById("resultadoMobilador").innerText);
  alert("Copiado!");
}
</script>
</body>
</html>
