<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador PRO Sensibilidade FF</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
  text-align:center;
}
.container{padding:20px;}
select, input{
  width:90%;
  margin:10px;
  padding:10px;
  border-radius:10px;
  border:none;
  font-size:16px;
}
button{
  width:90%;
  padding:15px;
  margin:10px;
  border:none;
  border-radius:10px;
  font-size:16px;
  font-weight:bold;
  background:red;
  color:white;
  cursor:pointer;
}
.resultado{
  background:#1a1a1a;
  padding:15px;
  margin-top:15px;
  border-radius:10px;
}
</style>
</head>

<body>
<div class="container">

<h2>🔥 GERADOR PRO DE SENSI FF 🔥</h2>

<select id="modo">
  <option value="mobile">📱 Mobile Normal</option>
  <option value="mobilador">🚀 Mobilador (GG Mouse Pro)</option>
</select>

<select id="celular"></select>

<select id="estilo">
  <option value="equilibrado">⚖️ Rush Equilibrado</option>
  <option value="capa">🎯 Mais Capa (HS)</option>
</select>

<p>DPI: <span id="dpiValor">600</span></p>
<input type="range" min="300" max="800" value="600" id="dpi">

<p>Botão: <span id="botaoValor">50</span>%</p>
<input type="range" min="20" max="100" value="50" id="botao">

<p>Cursor: <span id="cursorValor">50</span></p>
<input type="range" min="10" max="100" value="50" id="cursor">

<button onclick="gerar()">GERAR</button>
<button onclick="copiar()">COPIAR</button>

<div class="resultado" id="resultado">
Seu resultado aparecerá aqui...
</div>

</div>

<script>
window.onload = function(){

// ---------------- CELULARES COMPLETOS ----------------
const celulares = [

  // 🔻 FRACOS
  {nome:"Samsung A10", tipo:"fraco"},
  {nome:"Samsung A12", tipo:"fraco"},
  {nome:"Samsung A13", tipo:"fraco"},
  {nome:"Samsung A03", tipo:"fraco"},
  {nome:"Moto E7", tipo:"fraco"},
  {nome:"Moto E13", tipo:"fraco"},
  {nome:"Moto G8 Play", tipo:"fraco"},
  {nome:"Redmi 9A", tipo:"fraco"},
  {nome:"Redmi 10A", tipo:"fraco"},
  {nome:"Realme C11", tipo:"fraco"},
  {nome:"Realme C30", tipo:"fraco"},
  {nome:"Infinix Hot 12", tipo:"fraco"},
  {nome:"Tecno Spark 9", tipo:"fraco"},
  {nome:"Galaxy M02", tipo:"fraco"},

  // ⚖️ MÉDIOS
  {nome:"Motorola G23", tipo:"medio"},
  {nome:"Moto G32", tipo:"medio"},
  {nome:"Moto G52", tipo:"medio"},
  {nome:"Moto G60", tipo:"medio"},
  {nome:"Moto G84", tipo:"medio"},
  {nome:"Samsung A32", tipo:"medio"},
  {nome:"Samsung A34", tipo:"medio"},
  {nome:"Samsung A51", tipo:"medio"},
  {nome:"Samsung A54", tipo:"medio"},
  {nome:"Samsung A25 5G", tipo:"medio"},
  {nome:"Samsung A15 5G", tipo:"medio"},
  {nome:"Redmi Note 10", tipo:"medio"},
  {nome:"Redmi Note 11", tipo:"medio"},
  {nome:"Redmi Note 12", tipo:"medio"},
  {nome:"Redmi Note 13 4G", tipo:"medio"},
  {nome:"Redmi Note 13 5G", tipo:"medio"},
  {nome:"POCO M3", tipo:"medio"},
  {nome:"POCO M5", tipo:"medio"},
  {nome:"POCO X5", tipo:"medio"},
  {nome:"Realme 11", tipo:"medio"},
  {nome:"Realme 12", tipo:"medio"},
  {nome:"Galaxy M12", tipo:"medio"},

  // 🚀 FORTES
  {nome:"POCO X3 Pro", tipo:"forte"},
  {nome:"POCO X5 Pro", tipo:"forte"},
  {nome:"POCO X6 Pro", tipo:"forte"},
  {nome:"POCO F4", tipo:"forte"},
  {nome:"POCO F5", tipo:"forte"},
  {nome:"Samsung S20 FE", tipo:"forte"},
  {nome:"Samsung S21", tipo:"forte"},
  {nome:"Samsung S22", tipo:"forte"},
  {nome:"Samsung S23", tipo:"forte"},
  {nome:"Samsung S24", tipo:"forte"},
  {nome:"iPhone XR", tipo:"forte"},
  {nome:"iPhone 11", tipo:"forte"},
  {nome:"iPhone 12", tipo:"forte"},
  {nome:"iPhone 13", tipo:"forte"},
  {nome:"iPhone 14", tipo:"forte"},
  {nome:"iPhone 15", tipo:"forte"},
  {nome:"ROG Phone 6", tipo:"forte"},
  {nome:"ROG Phone 7", tipo:"forte"},
  {nome:"Asus Zenfone 10", tipo:"forte"},
  {nome:"Realme GT 3", tipo:"forte"},
  {nome:"Redmi K60", tipo:"forte"},
  {nome:"Xiaomi 13 Pro", tipo:"forte"},
  {nome:"OnePlus 12", tipo:"forte"}
];

// carregar select
const selectCelular = document.getElementById("celular");
celulares.forEach(cel=>{
  let option = document.createElement("option");
  option.value = cel.tipo;
  option.textContent =
    cel.tipo==="fraco"?"🔻 "+cel.nome:
    cel.tipo==="medio"?"⚖️ "+cel.nome:
    "🚀 "+cel.nome;
  selectCelular.appendChild(option);
});

// sliders
const dpi = document.getElementById("dpi");
const botao = document.getElementById("botao");
const cursor = document.getElementById("cursor");

const dpiValor = document.getElementById("dpiValor");
const botaoValor = document.getElementById("botaoValor");
const cursorValor = document.getElementById("cursorValor");

dpi.oninput = ()=> dpiValor.innerText = dpi.value;
botao.oninput = ()=> botaoValor.innerText = botao.value;
cursor.oninput = ()=> cursorValor.innerText = cursor.value;

// -------- GERADOR ORIGINAL --------
window.gerar = function(){

  let tipo = selectCelular.value;
  let estilo = document.getElementById("estilo").value;

  let dpiVal = parseInt(dpi.value);
  let botaoVal = parseInt(botao.value);
  let cursorVal = parseInt(cursor.value);

  let base = tipo==="fraco"?88: tipo==="medio"?100:110;

  let ajusteDPI = (dpiVal - 500)/25;
  let ajusteCursor = (cursorVal - 50)/6;
  let ajusteBotao = (botaoVal - 50)/12;

  let geral = base + ajusteDPI + ajusteCursor - ajusteBotao;

  if(estilo==="capa") geral -= 4;

  let redDot = geral - 2;
  let x2 = geral - 8;
  let x4 = geral - 15;
  let awm = geral - 25;
  let olhadinha = geral + 6;

  if(estilo==="capa"){
    redDot -= 2;
    x2 -= 2;
    x4 -= 3;
    olhadinha += 2;
  }

  function limitar(v){
    if(v<0)return 0;
    if(v>200)return 200;
    return Math.round(v);
  }

  geral=limitar(geral);
  redDot=limitar(redDot);
  x2=limitar(x2);
  x4=limitar(x4);
  awm=limitar(awm);
  olhadinha=limitar(olhadinha);

  document.getElementById("resultado").innerHTML=`
    🔥 RESULTADO CALIBRADO 🔥<br><br>
    Estilo: ${estilo} <br>
    DPI: ${dpiVal} <br><br>

    🎯 Geral: ${geral} <br>
    🔴 RedDot: ${redDot} <br>
    🔍 2x: ${x2} <br>
    🔭 4x: ${x4} <br>
    🎯 AWM: ${awm} <br>
    👁️ Olhadinha: ${olhadinha} <br><br>

    ⚙️ Botão: ${botaoVal}%
  `;
}

// -------- ADDON (SEM ALTERAR NADA) --------
const gerarOriginal = window.gerar;

window.gerar = function(){

  gerarOriginal();

  let modo = document.getElementById("modo").value;
  let resultadoDiv = document.getElementById("resultado");

  let extra = "<br><br>⚙️ SISTEMA AVANÇADO<br>";

  let bufferGPUList = ["8.192KB","16.384KB","32.768KB","65.536KB"];
  let bufferGPU = bufferGPUList[Math.floor(Math.random()*4)];

  extra += `⚙️ Buffer GPU: ${bufferGPU}<br>`;

  if(modo==="mobilador"){
    extra += `
    <br>🖱️ GG Mouse Pro<br>
    DPI Mouse: ${Math.floor(Math.random()*800+800)}<br>
    Horizontal: ${Math.floor(Math.random()*60+260)}<br>
    Vertical: ${Math.floor(Math.random()*70+280)}<br>
    `;
  }

  resultadoDiv.innerHTML += extra;
}

// copiar
window.copiar = function(){
  let texto = document.getElementById("resultado").innerText;
  navigator.clipboard.writeText(texto);
  alert("Copiado!");
}

}
</script>

</body>
</html>
