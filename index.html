<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador PRO Sensibilidade FF - Cards Animados</title>
<style>
body{
  margin:0;
  font-family:'Arial', sans-serif;
  background:#121212;
  color:white;
  text-align:center;
}
.container{
  padding:20px;
  max-width:500px;
  margin:auto;
}
h2{
  color:#ff4c4c;
  text-shadow:0 0 10px #ff0000;
}

/* Cards */
.cards{
  display:flex;
  flex-direction:column;
  gap:15px;
  margin-top:20px;
}
.card{
  background:#1a1a1a;
  border-radius:10px;
  padding:15px;
  text-align:left;
  transition:0.3s;
  box-shadow:0 4px 10px rgba(0,0,0,0.5);
}
.card:hover{
  transform: translateY(-5px);
  box-shadow:0 8px 20px rgba(255,0,0,0.4);
}

/* Sliders e selects */
select,input[type=range]{
  width:90%;
  margin:10px 0;
  padding:10px;
  border-radius:10px;
  border:none;
  font-size:16px;
  background:#1f1f1f;
  color:white;
}

/* Botões */
button{
  width:90%;
  padding:15px;
  margin:10px 0;
  border:none;
  border-radius:10px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}
button:hover{
  transform: translateY(-3px);
  box-shadow:0 4px 15px rgba(255,0,0,0.4);
}

/* Slider custom */
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width:20px;
  height:20px;
  background:#ff4c4c;
  border-radius:50%;
  cursor:pointer;
  box-shadow:0 0 5px rgba(255,0,0,0.7);
  transition:0.3s;
}
input[type=range]::-webkit-slider-thumb:hover {
  transform: scale(1.2);
}

label{display:block; text-align:left; margin-left:5%;}
</style>
</head>
<body>

<div class="container">
<h2>🔥 GERADOR PRO DE SENSI FF 🔥</h2>

<select id="modo">
  <option value="mobile">📱 Mobile Normal</option>
  <option value="mobilador">🚀 Mobilador (GG Mouse Pro)</option>
</select>

<select id="celular"></select>

<select id="estilo">
  <option value="equilibrado">⚖️ Rush Equilibrado</option>
  <option value="capa">🎯 Mais Capa (HS)</option>
</select>

<p id="dpiContainer">DPI: <span id="dpiValor">600</span></p>
<input type="range" min="300" max="800" value="600" id="dpi">

<p>Botão: <span id="botaoValor">50</span>%</p>
<input type="range" min="20" max="100" value="50" id="botao">

<p id="ciclosContainer" style="display:none;">
<select id="ciclos">
  <option value="1">Ciclos 1</option>
  <option value="2">Ciclos 2</option>
  <option value="3">Ciclos 3</option>
  <option value="4">Ciclos 4</option>
  <option value="5">Ciclos 5</option>
  <option value="6">Ciclos 6</option>
  <option value="7" selected>Ciclos 7</option>
  <option value="8">Ciclos 8</option>
  <option value="9">Ciclos 9</option>
  <option value="10">Ciclos 10</option>
</select>
</p>

<select id="bufferGPU">
  <option value="8192KB">Buffer GPU: 8.192KB</option>
  <option value="16384KB">Buffer GPU: 16.384KB</option>
  <option value="32768KB">Buffer GPU: 32.768KB</option>
  <option value="65536KB">Buffer GPU: 65.536KB</option>
</select>

<select id="bufferLogger">
  <option value="60KB">Buffer Logger: 60KB</option>
  <option value="256KB">Buffer Logger: 256KB</option>
  <option value="1MB">Buffer Logger: 1MB</option>
  <option value="4MB">Buffer Logger: 4MB</option>
</select>

<button onclick="gerar()">GERAR</button>
<button onclick="copiar()">COPIAR</button>

<div class="cards" id="resultado">
Seu resultado aparecerá aqui...
</div>
</div>

<script>
// Elementos
const selectCelular = document.getElementById("celular");
const dpi = document.getElementById("dpi");
const dpiValor = document.getElementById("dpiValor");
const botao = document.getElementById("botao");
const botaoValor = document.getElementById("botaoValor");
const ciclosContainer = document.getElementById("ciclosContainer");
const ciclos = document.getElementById("ciclos");
const dpiContainer = document.getElementById("dpiContainer");

// Atualiza sliders
dpi.oninput = ()=> dpiValor.innerText = dpi.value;
botao.oninput = ()=> botaoValor.innerText = botao.value;

// Lista de celulares por marca
const marcas = {
  "Samsung":["A10","A12","A13","A03","A32","A34","A51","A54","A25 5G","A15 5G","S20 FE","S21","S22","S23","S24","M02","M12"],
  "Motorola":["G23","G32","G52","G60","G84","E7","E13","G8 Play"],
  "Redmi":["9A","10A","Note 10","Note 11","Note 12","Note 13 4G","Note 13 5G","K60"],
  "POCO":["M3","M5","X3 Pro","X5","X5 Pro","X6 Pro","F4","F5"],
  "Realme":["C11","C30","11","12","GT 3"],
  "iPhone":["XR","11","12","13","14","15"],
  "ROG":["Phone 6","Phone 7"],
  "Asus":["Zenfone 10"],
  "Xiaomi":["13 Pro"],
  "OnePlus":["12"]
};

// Preenche select
for(const marca in marcas){
  let group = document.createElement("optgroup");
  group.label = marca;
  marcas[marca].forEach(aparelho=>{
    let option = document.createElement("option");
    option.value = marca+" "+aparelho;
    option.textContent = marca+" "+aparelho;
    group.appendChild(option);
  });
  selectCelular.appendChild(group);
}

// Atualiza visibilidade
function atualizarConfigAndroid(){
  const tipo = selectCelular.value.toLowerCase();
  const isIphone = tipo.includes("iphone");

  dpiContainer.style.display = isIphone ? "none" : "block";
  ciclosContainer.style.display = isIphone ? "block" : "none";

  gerar();
}

selectCelular.onchange = atualizarConfigAndroid;
dpi.oninput = gerar;
botao.oninput = gerar;
ciclos.onchange = gerar;

// Gera cards
function gerar(){
  const tipo = selectCelular.value.toLowerCase();
  const estilo = document.getElementById("estilo").value;
  const modo = document.getElementById("modo").value;
  const botaoVal = parseInt(botao.value);
  const ciclosVal = parseInt(ciclos.value);
  const bufferGPU = document.getElementById("bufferGPU").value;
  const bufferLogger = document.getElementById("bufferLogger").value;

  const isIphone = tipo.includes("iphone");

  const dpiVal = isIphone ? "N/A" : parseInt(dpi.value);

  // Valores fixos
  const geral = 100;
  const redDot = 98;
  const x2 = 92;
  const x4 = 85;
  const awm = 75;
  const olhadinha = 106;
  const antiRecuo = 100;
  const auxMira = 100;
  const estabilidade = 100;

  document.getElementById("resultado").innerHTML=`
    <div class="card">
      <strong>${selectCelular.value}</strong> <br>
      Estilo: ${estilo} <br>
      Modo: ${modo} <br>
      ${isIphone ? `Ciclos: ${ciclosVal} <br>` : `DPI: ${dpiVal} <br>
      🎯 Geral: ${geral} <br>
      🔴 RedDot: ${redDot} <br>
      🔍 2x: ${x2} <br>
      🔭 4x: ${x4} <br>
      🎯 AWM: ${awm} <br>
      👁 Olhadinha: ${olhadinha} <br>`}
      ⚙️ Botão: ${botaoVal}% <br>
      ⚙️ Anti Recuo: ${antiRecuo}% <br>
      ⚙️ Auxílio de Mira: ${auxMira}% <br>
      ⚙️ Estabilidade: ${estabilidade}% <br>
      ⚙️ Buffer GPU: ${bufferGPU} <br>
      ⚙️ Buffer Logger: ${bufferLogger} <br>
    </div>
  `;
}

window.gerar = gerar;

window.copiar = function(){
  let texto = document.getElementById("resultado").innerText;
  navigator.clipboard.writeText(texto);
  alert("Copiado!");
}

atualizarConfigAndroid();
</script>

</body>
</html>
