<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GERADOR PRO FF EXTREMO</title>

<style>
body{margin:0;font-family:Arial;background:#0f0f0f;color:white;text-align:center;}
.container{padding:20px;max-width:500px;margin:auto;}
h2{color:red;text-shadow:0 0 10px #ff0000;}
select,input{width:90%;margin:10px;padding:10px;border-radius:10px;border:none;background:#1a1a1a;color:white;}
button{width:90%;padding:15px;margin:10px;border:none;border-radius:10px;background:red;color:white;font-weight:bold;}
.resultado{background:#1a1a1a;padding:15px;margin-top:15px;border-radius:10px;text-align:left;}
</style>
</head>

<body>

<div id="login" style="position:fixed;width:100%;height:100%;background:#0f0f0f;display:flex;justify-content:center;align-items:center;flex-direction:column;">
<h1 style="color:red;">SENSI PRO 🔥</h1>
<input id="senha" type="password" placeholder="Digite a senha">
<button onclick="entrar()">ENTRAR</button>
</div>

<div class="container">
<h2>🔥 GERADOR PRO EXTREMO 2026 🔥</h2>

<select id="modo">
<option value="mobile">📱 Mobile</option>
<option value="mobilador">🖱️ Mobilador</option>
</select>

<select id="celular"></select>

<select id="sensi">
<option value="baixa">Baixa</option>
<option value="media">Média</option>
<option value="alta">Alta</option>
<option value="capa">🔥 Capa Fixa</option>
</select>

<button onclick="gerar()">GERAR 🔥</button>
<button onclick="gerar()">GERAR NOVAMENTE 🔥</button>
<button onclick="copiar()">COPIAR 📋</button>

<div class="resultado" id="resultado"></div>
</div>

<script>

// LOGIN
const SENHA = "sensipro";
function entrar(){
if(senha.value === SENHA){
login.style.display="none";
}else{
alert("Senha incorreta");
}
}

// CELULARES
const marcas = {
"Samsung":["A10","A11","A12","A13","A14","A15","A20","A21","A22","A23","A24","A30","A31","A32","A33","A34","A50","A51","A52","A53","A54","S20 FE","S21","S22","S23","S24"],
"Motorola":["G22","G23","G31","G32","G35 5G","G41","G42","G52","G53","G54","G60","G73","Edge 20","Edge 30 Neo","Edge 40","G05"],
"Xiaomi / Redmi":["Redmi 9A","Redmi 10A","Redmi 12","Redmi 13C","Redmi Note 9","Redmi Note 10","Redmi Note 11","Redmi Note 12","Redmi Note 13 4G","Redmi Note 13 5G","Redmi Note 14"],
"POCO":["M3","M4","M5","X3 Pro","X4 GT","X5","X6","X6 Pro","F3","F4","F5"],
"Realme":["C30","C31","C35","C51","C53","C55","Realme 8","Realme 9","Realme 10","Realme 11","Realme GT","GT Neo"],
"iPhone":["XR","XS","11","11 Pro","12","12 Pro","13","13 Pro","14","14 Pro","15","15 Pro"]
};

for(let marca in marcas){
let group=document.createElement("optgroup");
group.label=marca;

marcas[marca].forEach(modelo=>{
let option=document.createElement("option");
option.textContent = (marca==="Xiaomi / Redmi") ? modelo : marca+" "+modelo;
group.appendChild(option);
});

celular.appendChild(group);
}

// GERAR
function gerar(){

let cel=celular.value;
let tipo=sensi.value;
let modo=document.getElementById("modo").value;

let base=170;

if(cel.includes("Samsung")) base+=5;
if(cel.includes("Redmi")) base-=5;
if(cel.includes("POCO")) base-=10;
if(cel.includes("Realme")) base-=8;
if(cel.includes("iPhone")) base-=15;
if(cel.includes("A10")||cel.includes("Redmi 9A")) base-=10;
if(cel.includes("G35")) base+=2;

let html=`📱 ${cel}<br>🎮 ${tipo.toUpperCase()}<br><br>`;

// MOBILE
if(modo==="mobile"){

function variacao(v){ return v + Math.floor(Math.random()*11 - 5); }

let geral,red,x2,x4,awm,olha;

if(tipo==="baixa"){geral=base-10;red=base-25;x2=base-40;x4=base-55;awm=base-75;olha=base;}
if(tipo==="media"){geral=base;red=base-10;x2=base-25;x4=base-40;awm=base-60;olha=base+10;}
if(tipo==="alta"){geral=base+10;red=base+5;x2=base-10;x4=base-25;awm=base-45;olha=base+25;}
if(tipo==="capa"){geral=base+15;red=base+20;x2=base+5;x4=base-10;awm=base-30;olha=base+35;}

geral=variacao(geral);
red=variacao(red);
x2=variacao(x2);
x4=variacao(x4);
awm=variacao(awm);
olha=variacao(olha);

let botao=55;
let vel;

if(tipo==="baixa") vel=Math.floor(Math.random()*10+30);
if(tipo==="media") vel=Math.floor(Math.random()*10+45);
if(tipo==="alta") vel=Math.floor(Math.random()*10+60);
if(tipo==="capa") vel=Math.floor(Math.random()*10+70);

if(cel.includes("Samsung")) botao=60;
if(cel.includes("Motorola")) botao=58;
if(cel.includes("Redmi")||cel.includes("POCO")) botao=50;
if(cel.includes("Realme")) botao=52;
if(cel.includes("iPhone")) botao=45;

let dpi;
if(tipo==="baixa") dpi=Math.floor(Math.random()*(600-390)+390);
if(tipo==="media") dpi=Math.floor(Math.random()*(800-600)+600);
if(tipo==="alta"||tipo==="capa") dpi=Math.floor(Math.random()*(1440-800)+800);

html+=`
🎯 Geral:${geral}<br>
🎯 RedDot:${red}<br>
🎯 2x:${x2}<br>
🎯 4x:${x4}<br>
🎯 AWM:${awm}<br>
🎯 Olhadinha:${olha}<br><br>
🔥 Botão:${botao}%<br>
⚡ Velocidade:${vel}<br>
`;

if(!cel.includes("iPhone")) html+=`📱 DPI:${dpi}`;
}

// MOBILADOR
if(modo==="mobilador"){

let dpiMouse;
if(tipo==="baixa") dpiMouse=[600,800,1000][Math.floor(Math.random()*3)];
if(tipo==="media") dpiMouse=[800,1000,1200][Math.floor(Math.random()*3)];
if(tipo==="alta"||tipo==="capa") dpiMouse=[1200,1600][Math.floor(Math.random()*2)];

let horizontal,vertical;

if(tipo==="baixa"){horizontal=Math.floor(Math.random()*40+260);vertical=Math.floor(Math.random()*40+230);}
if(tipo==="media"){horizontal=Math.floor(Math.random()*60+300);vertical=Math.floor(Math.random()*60+280);}
if(tipo==="alta"){horizontal=Math.floor(Math.random()*80+340);vertical=Math.floor(Math.random()*70+310);}
if(tipo==="capa"){horizontal=Math.floor(Math.random()*60+360);vertical=Math.floor(Math.random()*50+300);}

horizontal+=Math.floor(Math.random()*11-5);
vertical+=Math.floor(Math.random()*11-5);

if(tipo==="alta"||tipo==="capa") vertical-=10;

if(cel.includes("A10")||cel.includes("Redmi 9A")){
horizontal-=25;
vertical-=20;
dpiMouse-=200;
}

let velMouse;
if(tipo==="baixa") velMouse=Math.floor(Math.random()*10+30);
if(tipo==="media") velMouse=Math.floor(Math.random()*10+45);
if(tipo==="alta") velMouse=Math.floor(Math.random()*10+60);
if(tipo==="capa") velMouse=Math.floor(Math.random()*10+70);

html+=`
🎯 Geral:0<br>
🎯 RedDot:0<br>
🎯 2x:0<br>
🎯 4x:0<br>
🎯 AWM:0<br>
🎯 Olhadinha:0<br><br>

🖱️ DPI Mouse:${dpiMouse}<br>
➡️ Horizontal:${horizontal}<br>
➡️ Vertical:${vertical}<br>
⚡ Velocidade Mouse:${velMouse}<br>
`;
}

resultado.innerHTML=html;
}

// COPIAR
function copiar(){
navigator.clipboard.writeText(resultado.innerText);
alert("Copiado!");
}

</script>
</body>
</html>
