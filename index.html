<script>

// ----------------- CELULARES COM CONFIG IDEAL -----------------
const celulares = [
  {nome: "Samsung A10", tipo: "fraco", base: 88, horiz: 90, vert: 180, mouse: 120, cel: 130},
  {nome: "Samsung A12", tipo: "fraco", base: 90, horiz: 95, vert: 185, mouse: 125, cel: 135},
  {nome: "Motorola G23", tipo: "medio", base: 100, horiz: 100, vert: 200, mouse: 140, cel: 150},
  {nome: "Redmi Note 13 4G", tipo: "medio", base: 105, horiz: 110, vert: 210, mouse: 150, cel: 160},
  {nome: "POCO X3 Pro", tipo: "forte", base: 112, horiz: 120, vert: 220, mouse: 170, cel: 180},
  {nome: "iPhone 11", tipo: "forte", base: 115, horiz: 125, vert: 230, mouse: 180, cel: 190}
];

const select = document.getElementById("celular")

celulares.forEach((cel, index) => {
  let option = document.createElement("option")
  option.value = index

  if(cel.tipo === "fraco") option.textContent = "🔻 " + cel.nome
  if(cel.tipo === "medio") option.textContent = "⚖️ " + cel.nome
  if(cel.tipo === "forte") option.textContent = "🚀 " + cel.nome

  select.appendChild(option)
});

// ----------------- SLIDERS -----------------
dpi.oninput = () => dpiValor.innerText = dpi.value
botao.oninput = () => botaoValor.innerText = botao.value
cursor.oninput = () => cursorValor.innerText = cursor.value

horizJogo.oninput = () => horizJogoValor.innerText = horizJogo.value
vertJogo.oninput = () => vertJogoValor.innerText = vertJogo.value
mouse.oninput = () => mouseValor.innerText = mouse.value
cel.oninput = () => celValor.innerText = celValor.innerText = cel.value

// ----------------- GERADOR FF -----------------
function gerar(){

  let celSelecionado = celulares[celular.value]
  let estilo = document.getElementById("estilo").value

  let dpiVal = parseInt(dpi.value)
  let botaoVal = parseInt(botao.value)
  let cursorVal = parseInt(cursor.value)

  let base = celSelecionado.base

  let ajusteDPI = (dpiVal - 500)/15
  let ajusteCursor = (cursorVal - 50)/4
  let ajusteBotao = (botaoVal - 50)/8

  let geral = base + ajusteDPI + ajusteCursor - ajusteBotao

  if(estilo === "capa") geral -= 5

  let redDot = geral - 3
  let x2 = geral - 10
  let x4 = geral - 18
  let awm = geral - 28
  let olhadinha = geral + 8

  if(estilo === "capa"){
    redDot -= 2
    x2 -= 3
    x4 -= 5
  }

  function limitar(v){ if(v<0) return 0; if(v>200) return 200; return Math.round(v) }

  resultado.innerHTML = `
    🔥 RESULTADO PRO 🔥<br><br>
    Celular: ${celSelecionado.nome}<br>
    Estilo: ${estilo}<br>
    DPI: ${dpiVal}<br>
    Geral: ${limitar(geral)}<br>
    RedDot: ${limitar(redDot)}<br>
    2x: ${limitar(x2)}<br>
    4x: ${limitar(x4)}<br>
    AWM: ${limitar(awm)}<br>
    Olhadinha: ${limitar(olhadinha)}<br>
    Botão: ${botaoVal}%
  `
}

function copiar(){
  navigator.clipboard.writeText(resultado.innerText)
  alert("Copiado!")
}

// ----------------- GERADOR MAPEADOR MELHORADO -----------------
function gerarMapeador(){

  let celSelecionado = celulares[celular.value]

  // valores automáticos baseados no celular
  let horiz = celSelecionado.horiz
  let vert = celSelecionado.vert
  let mouseVal = celSelecionado.mouse
  let celVal = celSelecionado.cel

  // também soma com o ajuste do usuário
  horiz += parseInt(horizJogo.value) - 50
  vert += parseInt(vertJogo.value) - 50
  mouseVal += parseInt(mouse.value) - 50
  celVal += parseInt(cel.value) - 50

  let geral = (horiz + vert)/2

  resultadoMapeador.innerHTML = `
    🎮 RESULTADO MAPEADOR PRO 🎮<br><br>
    Celular: ${celSelecionado.nome}<br>
    Horizontal: ${Math.round(horiz)}<br>
    Vertical: ${Math.round(vert)}<br>
    Mouse: ${Math.round(mouseVal)}<br>
    Celular: ${Math.round(celVal)}<br>
    Geral Map: ${Math.round(geral)}
  `
}

function copiarMapeador(){
  navigator.clipboard.writeText(resultadoMapeador.innerText)
  alert("Copiado!")
}

</script>
