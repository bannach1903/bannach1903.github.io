<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de Sensibilidade FF</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
  text-align:center;
}

.container{
  padding:20px;
}

select, input{
  width:90%;
  margin:10px;
  padding:10px;
  border-radius:10px;
  border:none;
  font-size:16px;
}

button{
  width:90%;
  padding:15px;
  margin:10px;
  border:none;
  border-radius:10px;
  font-size:16px;
  font-weight:bold;
  background:red;
  color:white;
}

.resultado{
  background:#1a1a1a;
  padding:15px;
  margin-top:15px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>🔥 GERADOR DE SENSI FF 🔥</h2>

<select id="celular"></select>

<p>DPI: <span id="dpiValor">600</span></p>
<input type="range" min="300" max="800" value="600" id="dpi">

<p>Botão de Disparo: <span id="botaoValor">50</span>%</p>
<input type="range" min="20" max="100" value="50" id="botao">

<p>Velocidade do Cursor: <span id="cursorValor">50</span></p>
<input type="range" min="10" max="100" value="50" id="cursor">

<button onclick="gerar()">GERAR</button>
<button onclick="copiar()">COPIAR</button>

<div class="resultado" id="resultado">
Seu resultado aparecerá aqui...
</div>

</div>

<script>

// LISTA DE CELULARES
const celulares = [

  // FRACOS
  {nome: "Samsung A10", tipo: "fraco"},
  {nome: "Samsung A20", tipo: "fraco"},
  {nome: "Moto E7", tipo: "fraco"},
  {nome: "Moto G8 Play", tipo: "fraco"},

  // MÉDIOS
  {nome: "Motorola G23", tipo: "medio"},
  {nome: "Moto G52", tipo: "medio"},
  {nome: "Moto G60", tipo: "medio"},
  {nome: "Samsung A32", tipo: "medio"},
  {nome: "Samsung A51", tipo: "medio"},
  {nome: "Redmi Note 10", tipo: "medio"},
  {nome: "Redmi Note 11", tipo: "medio"},
  {nome: "Redmi Note 13 4G", tipo: "medio"},
  {nome: "POCO M3", tipo: "medio"},

  // FORTES
  {nome: "POCO X3 Pro", tipo: "forte"},
  {nome: "POCO X5", tipo: "forte"},
  {nome: "POCO F4", tipo: "forte"},
  {nome: "Samsung S21", tipo: "forte"},
  {nome: "Samsung S22", tipo: "forte"},
  {nome: "iPhone XR", tipo: "forte"},
  {nome: "iPhone 11", tipo: "forte"},
  {nome: "iPhone 12", tipo: "forte"}

]

// CARREGAR SELECT
const select = document.getElementById("celular")

celulares.forEach(cel => {
  let option = document.createElement("option")
  option.value = cel.tipo

  if(cel.tipo === "fraco") option.textContent = "🔻 " + cel.nome
  if(cel.tipo === "medio") option.textContent = "⚖️ " + cel.nome
  if(cel.tipo === "forte") option.textContent = "🚀 " + cel.nome

  select.appendChild(option)
})

// ATUALIZAR VALORES
dpi.oninput = () => dpiValor.innerText = dpi.value
botao.oninput = () => botaoValor.innerText = botao.value
cursor.oninput = () => cursorValor.innerText = cursor.value

function gerar(){

  let tipo = document.getElementById("celular").value
  let dpiVal = parseInt(dpi.value)
  let botaoVal = parseInt(botao.value)
  let cursorVal = parseInt(cursor.value)

  let base

  if(tipo === "fraco"){
    base = 120
  }else if(tipo === "medio"){
    base = 140
  }else{
    base = 160
  }

  let geral = base + (dpiVal/10) + (cursorVal/5)
  let redDot = geral - 5
  let x2 = geral - 15
  let x4 = geral - 25
  let awm = geral - 35
  let olhadinha = geral + 10

  geral -= botaoVal/10
  redDot -= botaoVal/12

  geral = Math.round(geral)
  redDot = Math.round(redDot)
  x2 = Math.round(x2)
  x4 = Math.round(x4)
  awm = Math.round(awm)
  olhadinha = Math.round(olhadinha)

  document.getElementById("resultado").innerHTML = `
  🔥 RESULTADO 🔥<br><br>
  DPI: ${dpiVal} <br>
  Geral: ${geral} <br>
  RedDot: ${redDot} <br>
  2x: ${x2} <br>
  4x: ${x4} <br>
  AWM: ${awm} <br>
  Olhadinha: ${olhadinha} <br>
  Botão: ${botaoVal}% 
  `
}

function copiar(){
  let texto = document.getElementById("resultado").innerText
  navigator.clipboard.writeText(texto)
  alert("Copiado!")
}

</script>

</body>
</html>
