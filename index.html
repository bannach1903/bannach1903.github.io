<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GERADOR PRO FF EXTREMO</title>
<style>
body{margin:0;font-family:Arial;background:#0f0f0f;color:white;text-align:center;}
.container{padding:20px;max-width:500px;margin:auto;}
h2{color:red;text-shadow:0 0 10px #ff0000;}
select,input{width:90%;margin:10px;padding:10px;border-radius:10px;border:none;background:#1a1a1a;color:white;}
button{width:90%;padding:15px;margin:10px;border:none;border-radius:10px;background:red;color:white;font-weight:bold;}
.resultado{background:#1a1a1a;padding:15px;margin-top:15px;border-radius:10px;text-align:left;}
</style>
</head>

<body>

<div class="container">

<h2>🔥 GERADOR PRO FF EXTREMO 🔥</h2>

<select id="modo">
  <option value="mobile">📱 Mobile</option>
  <option value="mobilador">🖱️ Mobilador (GG Mouse Pro)</option>
</select>

<select id="celular"></select>

<!-- DPI do jogo -->
<div id="dpiBox">
<p>DPI do Jogo: <span id="dpiValor">600</span></p>
<input type="range" min="300" max="800" value="600" id="dpi">
</div>

<button onclick="gerar()">GERAR</button>
<button onclick="copiar()">COPIAR</button>

<div class="resultado" id="resultado"></div>

</div>

<script>
// Lista de celulares
const baseCelulares = {
  "Samsung A10": 92,"Samsung A12": 95,"Samsung A13": 98,"Samsung A23 5G": 105,
  "Samsung A32": 108,"Samsung A34": 110,"Samsung A51": 107,"Samsung A54": 112,
  "Samsung A15 5G": 106,"Samsung S20 FE": 115,"Samsung S21": 118,
  "Motorola G23": 102,"Motorola G32": 104,"Motorola G52": 106,"Motorola G60": 108,
  "Redmi 9A": 90,"Redmi 10A": 93,"Redmi Note 10": 100,"Redmi Note 11": 105,
  "Redmi Note 12": 108,"Redmi Note 13 4G": 110,"Redmi 14C": 108,
  "POCO M3": 100,"POCO X3 Pro": 118,"POCO X5": 112,"POCO X6 Pro": 120,
  "POCO C75": 103,
  "iPhone XR": 110,"iPhone 11": 115,"iPhone 12": 118,"iPhone 13": 120
};

const select = document.getElementById("celular");
for(let cel in baseCelulares){
  let option = document.createElement("option");
  option.textContent = cel;
  select.appendChild(option);
}

// Sliders
dpi.oninput = ()=> dpiValor.innerText = dpi.value;

// Detectar mobilador
const modoSelect = document.getElementById("modo");
modoSelect.addEventListener("change",()=>{
  if(modoSelect.value==="mobilador"){
    document.getElementById("dpiBox").style.display = "none";
  }else{
    document.getElementById("dpiBox").style.display = "block";
  }
});

// GERAR
function gerar(){
  const cel = select.value;
  const modo = modoSelect.value;

  let resultadoTexto = `📱 ${cel}<br>🎮 Modo: ${modo}<br><br>`;

  if(modo==="mobilador"){
    // Sensibilidade do jogo
    const sensiJogo = 0;

    // Calcular DPI do mouse GG automaticamente conforme base do mobilador
    // Base arbitrária de mobilador para cálculo
    const baseMobilador = 112; // você pode ajustar conforme preferir

    let dpiMouse;
    if(baseMobilador <= 100) dpiMouse = 500;
    else if(baseMobilador <= 110) dpiMouse = 800;
    else if(baseMobilador <= 120) dpiMouse = 1000;
    else if(baseMobilador <= 130) dpiMouse = 1200;
    else dpiMouse = 1600;

    resultadoTexto += `🖱️ GG Mouse Pro<br>`;
    resultadoTexto += `DPI Mouse: ${dpiMouse}<br>`;
    resultadoTexto += `Horizontal: 0<br>`;
    resultadoTexto += `Vertical: 0<br>`;
    resultadoTexto += `Polling Rate: 500 Hz<br><br>`;
    resultadoTexto += `🎯 Geral: 0<br>🔴 RedDot: 0<br>🔍 2x: 0<br>🔭 4x: 0<br>🎯 AWM: 0<br>👁 Olhadinha: 0<br><br>`;
    resultadoTexto += `🎯 Auxílio de Mira: 100%<br>🔫 Anti Recuo: 100%<br>🎯 Precisão: 100%<br>`;

  }else{
    const dpiVal = dpi.value;
    resultadoTexto += `DPI do Jogo: ${dpiVal}<br>`;
    resultadoTexto += `🎯 Geral: 0<br>🔴 RedDot: 0<br>🔍 2x: 0<br>🔭 4x: 0<br>🎯 AWM: 0<br>👁 Olhadinha: 0<br><br>`;
    resultadoTexto += `🎯 Auxílio de Mira: 100%<br>🔫 Anti Recuo: 100%<br>🎯 Precisão: 100%<br>`;
  }

  document.getElementById("resultado").innerHTML = resultadoTexto;
}

function copiar(){
  navigator.clipboard.writeText(document.getElementById("resultado").innerText);
  alert("Copiado!");
}
</script>
</body>
</html>
