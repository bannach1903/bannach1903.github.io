<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GERADOR PRO FF ULTRA</title>

<style>
body{margin:0;font-family:Arial;background:#0f0f0f;color:white;text-align:center;}
.container{padding:20px;max-width:500px;margin:auto;}
h2{color:red;text-shadow:0 0 10px #ff0000;}
select,input{width:90%;margin:10px;padding:10px;border-radius:10px;border:none;background:#1a1a1a;color:white;}
button{width:90%;padding:15px;margin:10px;border:none;border-radius:10px;background:red;color:white;font-weight:bold;}
.resultado{background:#1a1a1a;padding:15px;margin-top:15px;border-radius:10px;}
.hidden{display:none;}
</style>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

</head>

<body>

<div class="container">

<!-- LOGIN -->
<div id="login">
<h2>🔐 ATIVAR ACESSO</h2>
<input id="key" placeholder="Digite sua KEY">
<button onclick="logar()">Entrar</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

<h2>🔥 GERADOR PRO EXTREMO 🔥</h2>

<select id="modo">
  <option value="mobile">📱 Mobile</option>
  <option value="mobilador">🖱️ Mobilador (GG Mouse Pro)</option>
</select>

<select id="celular"></select>

<select id="estilo">
  <option value="equilibrado">⚖️ Equilibrado</option>
  <option value="capa">🎯 Capa (HS)</option>
</select>

<!-- DPI -->
<div id="dpiBox">
<p>DPI: <span id="dpiValor">600</span></p>
<input type="range" min="300" max="800" value="600" id="dpi">
</div>

<!-- BOTÃO -->
<p>Botão: <span id="botaoValor">50</span>%</p>
<input type="range" min="20" max="100" value="50" id="botao">

<!-- CURSOR -->
<div id="cursorBox">
<p>Cursor: <span id="cursorValor">50</span></p>
<input type="range" min="10" max="100" value="50" id="cursor">
</div>

<button onclick="gerar()">GERAR</button>
<button onclick="copiar()">COPIAR</button>

<div class="resultado" id="resultado"></div>

</div>

</div>

<script>

// 🔥 CONFIG FIREBASE (COLOQUE O SEU)
const firebaseConfig = {
  apiKey: "SUA_KEY",
  authDomain: "SEU_DOMINIO",
  projectId: "SEU_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 📱 DEVICE ID
function getDeviceId(){
  let id = localStorage.getItem("device_id");
  if(!id){
    id = Math.random().toString(36).substring(2);
    localStorage.setItem("device_id", id);
  }
  return id;
}

// 🌐 IP
async function getIP(){
  try{
    let res = await fetch("https://api.ipify.org?format=json");
    let data = await res.json();
    return data.ip;
  }catch{
    return "erro";
  }
}

// 🔐 LOGIN
async function logar(){

  let key = document.getElementById("key").value.trim();
  let device = getDeviceId();
  let ip = await getIP();

  let ref = db.collection("keys").doc(key);
  let doc = await ref.get();

  if(!doc.exists){
    alert("❌ Key inválida");
    return;
  }

  let data = doc.data();

  if(data.expira && Date.now() > data.expira){
    alert("⏳ Key expirada");
    return;
  }

  if(data.status === "bloqueado"){
    alert("🚫 Conta bloqueada");
    return;
  }

  if(!data.device_id){
    await ref.update({ device_id: device, ip: ip });
  }
  else if(data.device_id !== device || data.ip !== ip){
    await ref.update({ status: "bloqueado" });
    alert("🚫 Compartilhamento detectado!");
    return;
  }

  document.getElementById("login").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");

  verificar(key, device, ip);
}

// 🔄 VERIFICAÇÃO
function verificar(key, device, ip){
  setInterval(async () => {
    let doc = await db.collection("keys").doc(key).get();
    let data = doc.data();

    if(data.status !== "ativo" || data.device_id !== device || data.ip !== ip){
      alert("🚫 Acesso bloqueado!");
      location.reload();
    }
  }, 8000);
}

// 🔥 LISTA DE CELULARES
const baseCelulares = {
  "Samsung A10": 92,"Samsung A12": 95,"Samsung A13": 98,"Samsung A23 5G": 105,
  "Samsung A32": 108,"Samsung A34": 110,"Samsung A51": 107,"Samsung A54": 112,
  "Samsung A15 5G": 106,"Samsung S20 FE": 115,"Samsung S21": 118,
  "Motorola G23": 102,"Motorola G32": 104,"Motorola G52": 106,"Motorola G60": 108,
  "Redmi 9A": 90,"Redmi 10A": 93,"Redmi Note 10": 100,"Redmi Note 11": 105,
  "Redmi Note 12": 108,"Redmi Note 13 4G": 110,"Redmi 14C": 108,
  "POCO M3": 100,"POCO X3 Pro": 118,"POCO X5": 112,"POCO X6 Pro": 120,
  "POCO C75": 103,
  "iPhone XR": 110,"iPhone 11": 115,"iPhone 12": 118,"iPhone 13": 120
};

const select = document.getElementById("celular");

for(let cel in baseCelulares){
  let option = document.createElement("option");
  option.textContent = cel;
  select.appendChild(option);
}

// sliders
dpi.oninput = ()=> dpiValor.innerText = dpi.value;
botao.oninput = ()=> botaoValor.innerText = botao.value;
cursor.oninput = ()=> cursorValor.innerText = cursor.value;

// detectar iphone
function verificarDispositivo(){
  let cel = select.value.toLowerCase();
  let isIphone = cel.includes("iphone");

  dpiBox.style.display = isIphone ? "none" : "block";
  cursorBox.style.display = isIphone ? "none" : "block";
}

select.addEventListener("change", verificarDispositivo);
verificarDispositivo();

// GERADOR COMPLETO
function gerar(){

  let cel = select.value;
  let estilo = estilo = document.getElementById("estilo").value;
  let modo = document.getElementById("modo").value;

  let dpiVal = parseInt(dpi.value);
  let botaoVal = parseInt(botao.value);
  let cursorVal = parseInt(cursor.value);

  let base = baseCelulares[cel];

  if(dpiVal < 450){ base += 6; }
  else if(dpiVal > 650){ base -= 4; }

  let geral = base + ((dpiVal - 600)/50) + ((cursorVal - 50)/10);

  if(estilo === "capa") geral -= 4;

  let geralFinal = modo === "mobilador" ? Math.round(geral/5) : geral;

  let redDot = geralFinal - 3;
  let x2 = geralFinal - 10;
  let x4 = geralFinal - 18;
  let awm = geralFinal - 30;
  let olhadinha = geralFinal + 6;

  resultado.innerHTML = `
  🔥 CONFIG PRO EXTREMA 🔥<br><br>
  📱 ${cel}<br>
  🎯 Geral: ${Math.round(geralFinal)}<br>
  🔴 RedDot: ${Math.round(redDot)}<br>
  🔍 2x: ${Math.round(x2)}<br>
  🔭 4x: ${Math.round(x4)}<br>
  🎯 AWM: ${Math.round(awm)}<br>
  👁 Olhadinha: ${Math.round(olhadinha)}
  `;
}

function copiar(){
  navigator.clipboard.writeText(resultado.innerText);
  alert("Copiado!");
}

</script>

</body>
</html>
