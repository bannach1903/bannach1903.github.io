<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador PRO FF Calibrado</title>

<style>
body{margin:0;font-family:Arial;background:#0f0f0f;color:white;text-align:center;}
.container{padding:20px;}
select,input{width:90%;margin:10px;padding:10px;border-radius:10px;border:none;background:#1a1a1a;color:white;}
button{width:90%;padding:15px;margin:10px;border:none;border-radius:10px;background:red;color:white;font-weight:bold;}
.resultado{background:#1a1a1a;padding:15px;margin-top:15px;border-radius:10px;}
h2{color:red;}
</style>
</head>

<body>

<div class="container">

<h2>🔥 SENSI PRO CALIBRADA 🔥</h2>

<select id="celular"></select>

<select id="estilo">
<option value="equilibrado">⚖️ Equilibrado</option>
<option value="capa">🎯 Capa (HS)</option>
</select>

<p>DPI: <span id="dpiValor">600</span></p>
<input type="range" min="300" max="800" value="600" id="dpi">

<button onclick="gerar()">GERAR</button>

<div class="resultado" id="resultado"></div>

</div>

<script>

// 🔥 BASE POR CELULAR (CALIBRADO)
const baseCelulares = {
  "Samsung A10": 92,
  "Samsung A12": 95,
  "Samsung A13": 98,
  "Samsung A23 5G": 105,
  "Motorola G23": 102,
  "Redmi Note 13 4G": 110,
  "Redmi 14C": 108,
  "POCO X3 Pro": 118,
  "POCO C75": 103,
  "iPhone 11": 115
};

const select = document.getElementById("celular");

// preencher lista
for(let cel in baseCelulares){
  let option = document.createElement("option");
  option.textContent = cel;
  select.appendChild(option);
}

// slider
dpi.oninput = ()=> dpiValor.innerText = dpi.value;

// gerar
function gerar(){

  let cel = select.value;
  let estilo = document.getElementById("estilo").value;
  let dpiVal = parseInt(dpi.value);

  // BASE DO CELULAR
  let base = baseCelulares[cel];

  // ajuste fino (micro ajuste)
  let ajusteDPI = (dpiVal - 600)/20;

  let geral = base + ajusteDPI;

  if(estilo === "capa") geral -= 4;

  let redDot = geral - 2;
  let x2 = geral - 8;
  let x4 = geral - 15;
  let awm = geral - 25;
  let olhadinha = geral + 6;

  function limitar(v){
    if(v < 0) return 0;
    if(v > 200) return 200;
    return Math.round(v);
  }

  geral = limitar(geral);
  redDot = limitar(redDot);
  x2 = limitar(x2);
  x4 = limitar(x4);
  awm = limitar(awm);
  olhadinha = limitar(olhadinha);

  // 🔥 CONTROLE PRO
  let auxMira = 95;
  let antiRecuo = 96;
  let precisao = 97;

  // ⚙️ BUFFER INTELIGENTE
  let bufferGPU = 16384;
  let bufferLogger = 256;

  if(geral < 100){
    bufferGPU = 16384;
    bufferLogger = 256;
  } else if(geral < 115){
    bufferGPU = 32768;
    bufferLogger = 1024;
  } else{
    bufferGPU = 65536;
    bufferLogger = 4096;
  }

  resultado.innerHTML = `
  🔥 CONFIG PRO PRONTA 🔥<br><br>

  📱 ${cel}<br><br>

  🎯 Geral: ${geral}<br>
  🔴 RedDot: ${redDot}<br>
  🔍 2x: ${x2}<br>
  🔭 4x: ${x4}<br>
  🎯 AWM: ${awm}<br>
  👁 Olhadinha: ${olhadinha}<br><br>

  🎯 Auxílio de Mira: ${auxMira}%<br>
  🔫 Anti Recuo: ${antiRecuo}%<br>
  🎯 Precisão: ${precisao}%<br><br>

  ⚙️ Buffer GPU: ${bufferGPU} KB<br>
  ⚙️ Buffer Logger: ${bufferLogger} KB<br><br>

  ⚠️ Ajuste fino: aumente/diminua no máximo 5 pontos se necessário
  `;
}

</script>

</body>
</html>
