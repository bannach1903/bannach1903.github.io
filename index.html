<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SensiPro FF Avançado</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
  text-align:center;
}

h1{
  background:black;
  padding:15px;
  color:#ff0033;
  box-shadow:0 0 15px red;
}

.painel{
  width:95%;
  max-width:500px;
  margin:auto;
}

.controle{
  margin:10px 0;
  text-align:left;
}

label{
  font-size:14px;
}

input[type=range]{
  width:100%;
  accent-color:#ff0033;
}

#area{
  width:95%;
  height:350px;
  margin:20px auto;
  background:#111;
  border:2px solid red;
  border-radius:10px;
  position:relative;
  overflow:hidden;
  touch-action:none;
}

#mira{
  width:30px;
  height:30px;
  border:3px solid #ff0033;
  border-radius:50%;
  position:absolute;
  top:150px;
  left:150px;
}

button{
  padding:10px;
  margin:5px;
  background:#ff0033;
  border:none;
  color:white;
  font-weight:bold;
  border-radius:6px;
}
</style>
</head>

<body>

<h1>🔥 SensiPro FF PRO</h1>

<div class="painel">

<div class="controle">
<label>Geral Horizontal <span id="ghv">100</span></label>
<input type="range" min="1" max="200" value="100" id="geralH">
</div>

<div class="controle">
<label>Geral Vertical <span id="gvv">100</span></label>
<input type="range" min="1" max="200" value="100" id="geralV">
</div>

<div class="controle">
<label>Red Dot Horizontal <span id="rdhv">90</span></label>
<input type="range" min="1" max="200" value="90" id="redH">
</div>

<div class="controle">
<label>Red Dot Vertical <span id="rdvv">90</span></label>
<input type="range" min="1" max="200" value="90" id="redV">
</div>

<div class="controle">
<label>2x Horizontal <span id="2xhv">80</span></label>
<input type="range" min="1" max="200" value="80" id="doisH">
</div>

<div class="controle">
<label>2x Vertical <span id="2xvv">80</span></label>
<input type="range" min="1" max="200" value="80" id="doisV">
</div>

<div class="controle">
<label>4x Horizontal <span id="4xhv">70</span></label>
<input type="range" min="1" max="200" value="70" id="quatroH">
</div>

<div class="controle">
<label>4x Vertical <span id="4xvv">70</span></label>
<input type="range" min="1" max="200" value="70" id="quatroV">
</div>

</div>

<div id="area">
<div id="mira"></div>
</div>

<button onclick="calcularAuto()">Calcular Automático</button>
<button onclick="resetar()">Resetar</button>

<script>

const sliders = document.querySelectorAll("input[type=range]");
sliders.forEach(slider=>{
  const span = slider.previousElementSibling.querySelector("span");
  span.innerText = slider.value;
  slider.oninput = ()=> span.innerText = slider.value;
});

let mira = document.getElementById("mira");
let area = document.getElementById("area");

let posX=150;
let posY=150;

area.addEventListener("touchmove",function(e){
e.preventDefault();

let sensiH = document.getElementById("geralH").value/50;
let sensiV = document.getElementById("geralV").value/50;

posX += (Math.random()*4-2)*sensiH;
posY += (Math.random()*4-2)*sensiV;

limitar();
});

function limitar(){
posX=Math.max(0,Math.min(posX,area.clientWidth-30));
posY=Math.max(0,Math.min(posY,area.clientHeight-30));
mira.style.left=posX+"px";
mira.style.top=posY+"px";
}

function calcularAuto(){

let largura = window.screen.width;
let altura = window.screen.height;
let dpi = window.devicePixelRatio;

let base = 100;

if(largura*altura > 2000000){
base -= 10;
}

if(dpi >= 3){
base -= 5;
}

document.getElementById("geralH").value = base;
document.getElementById("geralV").value = base-5;

document.getElementById("redH").value = base-10;
document.getElementById("redV").value = base-15;

document.getElementById("doisH").value = base-20;
document.getElementById("doisV").value = base-25;

document.getElementById("quatroH").value = base-30;
document.getElementById("quatroV").value = base-35;

sliders.forEach(slider=>{
  slider.dispatchEvent(new Event("input"));
});

alert("Sensibilidade calculada 🔥");
}

function resetar(){
location.reload();
}

</script>

</body>
</html>
