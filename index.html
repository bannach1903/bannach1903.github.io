<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Site de Sensi FF</title> <!-- Título da aba -->
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
      text-align: center;
    }
    .container {
      padding: 20px;
    }
    h1 {
      color: #ffcc00;
    }
    p {
      font-size: 18px;
    }
    select, button {
      padding: 10px;
      font-size: 16px;
      margin: 5px;
      border-radius: 5px;
    }
    #resultado {
      white-space: pre-line;
      margin-top: 10px;
    }
  </style>
  <script>
    // ---- GERADOR DE SENSIBILIDADE ----
    const dispositivos = {
      "iPhone 11": { dpi: 326, sensi: 80 },
      "Motorola G23": { dpi: 267, sensi: 70 },
      "Xiaomi Redmi Note 13 4G": { dpi: 395, sensi: 90 },
      "Samsung A15 5G": { dpi: 267, sensi: 75 }
      // adicione mais celulares aqui
    };

    function gerarSensi() {
      const sel = document.getElementById("celular").value;
      if(dispositivos[sel]){
        const s = dispositivos[sel].sensi;
        const d = dispositivos[sel].dpi;
        document.getElementById("resultado").innerText = 
          `Celular: ${sel}\nDPI: ${d}\nSensibilidade ideal: ${s}`;
      } else {
        document.getElementById("resultado").innerText = "Selecione um celular válido!";
      }
    }
  </script>
</head>
<body>
  <div class="container">
    <h1>Bem-vindo ao Meu Site de Sensi FF!</h1>
    <p>Aqui você pode gerar a sensibilidade perfeita para o seu Free Fire 🎮</p>

    <!-- GERADOR -->
    <div id="gerador">
      <select id="celular">
        <option value="">Selecione seu celular</option>
        <option value="iPhone 11">iPhone 11</option>
        <option value="Motorola G23">Motorola G23</option>
        <option value="Xiaomi Redmi Note 13 4G">Xiaomi Redmi Note 13 4G</option>
        <option value="Samsung A15 5G">Samsung A15 5G</option>
      </select>
      <button onclick="gerarSensi()">Gerar Sensibilidade</button>
      <p id="resultado"></p>
    </div>
  </div>
</body>
</html>
