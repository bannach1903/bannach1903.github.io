<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador Oficial de Sensi Free Fire</title>

<style>
body{
  margin:0;
  background:#0f0f0f;
  font-family:Arial;
  color:white;
  text-align:center;
}
h1{
  background:black;
  padding:15px;
  color:#ff0033;
  box-shadow:0 0 15px red;
}
.container{
  width:95%;
  max-width:500px;
  margin:auto;
  margin-top:20px;
  background:#1a1a1a;
  padding:20px;
  border-radius:10px;
  box-shadow:0 0 10px #ff0033;
}
select, button, input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:none;
}
button{
  background:#ff0033;
  color:white;
  font-weight:bold;
}

/* BOTÕES DE CELULAR */
#botoesCelular{
  display:flex;
  flex-wrap:wrap;
  gap:5px;
  margin-bottom:10px;
}
#botoesCelular button{
  flex:1 1 30%;
  background:#222;
}

/* SLIDER TEXTO */
#valorBotao{
  margin:0;
  font-size:14px;
  color:#ccc;
}

.resultado{
  margin-top:15px;
  text-align:left;
  background:#111;
  padding:15px;
  border-radius:8px;
}
</style>
</head>

<body>

<h1>🔥 GERADOR DE SENSI FREE FIRE 🔥</h1>

<div class="container">

<input type="text" id="buscarCelular" placeholder="🔍 Pesquisar celular...">

<!-- BOTÕES -->
<div id="botoesCelular"></div>

<label>📱 Escolha seu Celular</label>
<select id="celular">
<option value="a14">Samsung Galaxy A14</option>
<option value="a34">Samsung Galaxy A34</option>
<option value="s21">Samsung Galaxy S21</option>
<option value="note12">Redmi Note 12</option>
<option value="note13">Redmi Note 13 4G</option>
<option value="g23">Moto G23</option>
<option value="g32">Moto G32</option>
<option value="iphone11">iPhone 11</option>
<option value="realmeC55">Realme C55</option>
</select>

<label>📊 DPI</label>
<select id="dpi">
<option value="baixa">Baixa</option>
<option value="media">Média</option>
<option value="alta">Alta</option>
</select>

<label>🎮 Estilo de Jogo</label>
<select id="estilo">
<option value="rush">Rushador</option>
<option value="capa">Só Capa</option>
<option value="equilibrado">Equilibrado</option>
<option value="sniper">Sniper</option>
</select>

<label>⚡ Velocidade do Cursor</label>
<input type="range" min="1" max="10" value="5" id="cursor">

<label>🎯 Precisão</label>
<input type="range" min="1" max="10" value="7" id="precisao">

<label>🔥 Estabilidade</label>
<input type="range" min="1" max="10" value="6" id="estabilidade">

<!-- 🔘 BOTÃO DE TIRO -->
<label>🔘 Tamanho do Botão de Tiro (%)</label>
<input type="range" min="0" max="65" value="50" id="botaoTiro">
<p id="valorBotao">50%</p>

<button onclick="gerar()">GERAR SENSIBILIDADE</button>
<button onclick="copiarSensi()">📋 Copiar</button>
<button onclick="salvarSensi()">💾 Salvar</button>

<div id="resultado" class="resultado" style="display:none;"></div>

</div>

<script>

/* CELULARES */
const celulares = {
a14:{baixa:520,media:650,alta:750},
a34:{baixa:600,media:750,alta:900},
s21:{baixa:750,media:900,alta:1000},
note12:{baixa:650,media:800,alta:900},
note13:{baixa:700,media:850,alta:950},
g23:{baixa:600,media:700,alta:820},
g32:{baixa:600,media:750,alta:850},
iphone11:{baixa:750,media:900,alta:1000},
realmeC55:{baixa:600,media:750,alta:850}
};

/* NOMES */
const nomesCelulares = {
a14:"A14",
a34:"A34",
s21:"S21",
note12:"Note 12",
note13:"Note 13",
g23:"G23",
g32:"G32",
iphone11:"iPhone 11",
realmeC55:"C55"
};

/* 🔍 PESQUISA */
const input = document.getElementById("buscarCelular");
const select = document.getElementById("celular");

input.addEventListener("input", function(){
  let filtro = input.value.toLowerCase();
  for(let i=0;i<select.options.length;i++){
    let txt = select.options[i].text.toLowerCase();
    select.options[i].style.display =
      txt.includes(filtro) ? "block" : "none";
  }
});

/* 📱 BOTÕES */
const containerBotoes = document.getElementById("botoesCelular");

for(let key in celulares){
  let btn = document.createElement("button");
  btn.innerText = nomesCelulares[key] || key;

  btn.onclick = function(){
    document.getElementById("celular").value = key;
  };

  containerBotoes.appendChild(btn);
}

/* 🔘 SLIDER BOTÃO */
const sliderBotao = document.getElementById("botaoTiro");
const valorBotao = document.getElementById("valorBotao");

sliderBotao.oninput = function(){
  valorBotao.innerText = this.value + "%";
}

/* GERADOR */
function gerar(){

let celular = document.getElementById("celular").value;
let dpiTipo = document.getElementById("dpi").value;
let estilo = document.getElementById("estilo").value;

let cursor = document.getElementById("cursor").value;
let precisao = document.getElementById("precisao").value;
let estabilidade = document.getElementById("estabilidade").value;
let botao = document.getElementById("botaoTiro").value;

let dpiValor = celulares[celular][dpiTipo];

let base = Math.round(dpiValor / 6);

if(estilo=="rush") base+=15;
if(estilo=="capa") base-=5;
if(estilo=="sniper") base-=20;

let ajuste = (cursor*1.5)+(precisao*2)+(estabilidade*1.2);
base += Math.round(ajuste);

if(base>200) base=200;
if(base<60) base=60;

let geral=base;
let redDot=base-5;
let doisX=base-15;
let quatroX=base-25;
let awm=base-35;
let olhadinha=base+10;

document.getElementById("resultado").style.display="block";
document.getElementById("resultado").innerHTML=`
🔥 RESULTADO GERADO 🔥<br><br>
📱 DPI Numérica: ${dpiValor}<br>
🎮 Estilo: ${estilo}<br><br>
🎯 Geral: ${geral}<br>
🔴 Red Dot: ${redDot}<br>
🔭 2x: ${doisX}<br>
🔬 4x: ${quatroX}<br>
🎯 AWM: ${awm}<br>
👀 Olhadinha: ${olhadinha}<br>
🔘 Botão de Tiro: ${botao}%
`;

}

/* COPIAR */
function copiarSensi(){
let texto = document.getElementById("resultado").innerText;
navigator.clipboard.writeText(texto);
alert("Copiado!");
}

/* SALVAR */
function salvarSensi(){
let texto = document.getElementById("resultado").innerHTML;
localStorage.setItem("sensi", texto);
alert("Salvo!");
}

/* CARREGAR */
window.onload = function(){
let salva = localStorage.getItem("sensi");
if(salva){
document.getElementById("resultado").style.display="block";
document.getElementById("resultado").innerHTML = salva;
}
}

</script>

</body>
</html>
