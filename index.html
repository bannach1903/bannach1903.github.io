<script>
window.gerar = function(){

  let tipo = document.getElementById("celular").value;
  let estilo = document.getElementById("estilo").value;

  let dpiVal = parseInt(document.getElementById("dpi").value);
  let botaoVal = parseInt(document.getElementById("botao").value);
  let cursorVal = parseInt(document.getElementById("cursor").value);

  // 🔥 BASE MAIS ESTÁVEL
  let base = 0;

  if(tipo === "fraco") base = 88;
  if(tipo === "medio") base = 100;
  if(tipo === "forte") base = 110;

  // 🔧 AJUSTES SUAVES (ANTES TAVA MUITO FORTE)
  let ajusteDPI = (dpiVal - 500) / 25;      // mais suave
  let ajusteCursor = (cursorVal - 50) / 6;  // controle melhor
  let ajusteBotao = (botaoVal - 50) / 12;   // menos impacto

  let geral = base + ajusteDPI + ajusteCursor - ajusteBotao;

  // 🎯 ESTILO CAPA (AGORA MAIS INTELIGENTE)
  if(estilo === "capa"){
    geral -= 4; // leve redução pra puxar mais fácil
  }

  // 🔫 ESCOPOS MAIS BALANCEADOS
  let redDot = geral - 2;
  let x2 = geral - 8;
  let x4 = geral - 15;
  let awm = geral - 25;
  let olhadinha = geral + 6;

  if(estilo === "capa"){
    redDot -= 2;
    x2 -= 2;
    x4 -= 3;
    olhadinha += 2;
  }

  // 🔒 LIMITADOR INTELIGENTE
  function limitar(v){
    if(v < 0) return 0;
    if(v > 200) return 200;
    return Math.round(v);
  }

  geral = limitar(geral);
  redDot = limitar(redDot);
  x2 = limitar(x2);
  x4 = limitar(x4);
  awm = limitar(awm);
  olhadinha = limitar(olhadinha);

  // 📊 RESULTADO FINAL
  document.getElementById("resultado").innerHTML = `
    🔥 RESULTADO CALIBRADO 🔥<br><br>
    Estilo: ${estilo} <br>
    DPI: ${dpiVal} <br><br>

    🎯 Geral: ${geral} <br>
    🔴 RedDot: ${redDot} <br>
    🔍 2x: ${x2} <br>
    🔭 4x: ${x4} <br>
    🎯 AWM: ${awm} <br>
    👁️ Olhadinha: ${olhadinha} <br><br>

    ⚙️ Botão: ${botaoVal}%
  `;
}
</script>
