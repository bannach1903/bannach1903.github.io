<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SensiPro FF</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
  text-align:center;
}

h1{
  background:black;
  padding:15px;
  color:#ff0033;
  box-shadow:0 0 15px red;
}

.painel{
  width:95%;
  max-width:500px;
  margin:auto;
}

.controle{
  margin:15px 0;
  text-align:left;
}

label{
  font-size:14px;
}

input[type=range]{
  width:100%;
  accent-color:#ff0033;
}

#area{
  width:95%;
  height:350px;
  margin:20px auto;
  background:#111;
  border:2px solid red;
  border-radius:10px;
  position:relative;
  overflow:hidden;
  touch-action:none;
}

#mira{
  width:30px;
  height:30px;
  border:3px solid #ff0033;
  border-radius:50%;
  position:absolute;
  top:150px;
  left:150px;
}

button{
  padding:10px;
  margin:5px;
  background:#ff0033;
  border:none;
  color:white;
  font-weight:bold;
  border-radius:6px;
}
</style>
</head>

<body>

<h1>🔥 SensiPro FF</h1>

<div class="painel">

<div class="controle">
<label>Geral <span id="gValor">100</span></label>
<input type="range" min="1" max="200" value="100" id="geral">
</div>

<div class="controle">
<label>Red Dot <span id="rValor">90</span></label>
<input type="range" min="1" max="200" value="90" id="red">
</div>

<div class="controle">
<label>2x <span id="2Valor">80</span></label>
<input type="range" min="1" max="200" value="80" id="dois">
</div>

<div class="controle">
<label>4x <span id="4Valor">70</span></label>
<input type="range" min="1" max="200" value="70" id="quatro">
</div>

</div>

<div id="area">
<div id="mira"></div>
</div>

<button onclick="calcularAuto()">Calcular Automático</button>
<button onclick="resetar()">Resetar</button>

<script>

const geral = document.getElementById("geral");
const red = document.getElementById("red");
const dois = document.getElementById("dois");
const quatro = document.getElementById("quatro");

const gValor = document.getElementById("gValor");
const rValor = document.getElementById("rValor");
const doisValor = document.getElementById("2Valor");
const quatroValor = document.getElementById("4Valor");

gValor.innerText = geral.value;
rValor.innerText = red.value;
doisValor.innerText = dois.value;
quatroValor.innerText = quatro.value;

geral.oninput = ()=> gValor.innerText = geral.value;
red.oninput = ()=> rValor.innerText = red.value;
dois.oninput = ()=> doisValor.innerText = dois.value;
quatro.oninput = ()=> quatroValor.innerText = quatro.value;

let mira = document.getElementById("mira");
let area = document.getElementById("area");

let posX=150;
let posY=150;

let ultimoX=0;
let ultimoY=0;

area.addEventListener("touchstart",function(e){
ultimoX = e.touches[0].clientX;
ultimoY = e.touches[0].clientY;
});

area.addEventListener("touchmove",function(e){
e.preventDefault();

let toqueX = e.touches[0].clientX;
let toqueY = e.touches[0].clientY;

let movX = toqueX - ultimoX;
let movY = toqueY - ultimoY;

let sensi = geral.value / 50;

posX += movX * sensi;
posY += movY * sensi;

limitar();

ultimoX = toqueX;
ultimoY = toqueY;
});

function limitar(){
posX=Math.max(0,Math.min(posX,area.clientWidth-30));
posY=Math.max(0,Math.min(posY,area.clientHeight-30));
mira.style.left=posX+"px";
mira.style.top=posY+"px";
}

function calcularAuto(){

let largura = window.screen.width;
let altura = window.screen.height;
let dpi = window.devicePixelRatio;

let base = 100;

if(largura*altura > 2000000){
base -= 10;
}

if(dpi >= 3){
base -= 5;
}

geral.value = base;
red.value = base - 10;
dois.value = base - 20;
quatro.value = base - 30;

gValor.innerText = geral.value;
rValor.innerText = red.value;
doisValor.innerText = dois.value;
quatroValor.innerText = quatro.value;

alert("Sensibilidade ajustada 🔥");
}

function resetar(){
location.reload();
}

</script>

</body>
</html>
