<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GERADOR PRO FF EXTREMO</title>

<style>
body{margin:0;font-family:Arial;background:#0f0f0f;color:white;text-align:center;}
.container{padding:20px;max-width:500px;margin:auto;}
h2{color:red;text-shadow:0 0 10px #ff0000;}
select,input{width:90%;margin:10px;padding:10px;border-radius:10px;border:none;background:#1a1a1a;color:white;}
button{width:90%;padding:15px;margin:10px;border:none;border-radius:10px;background:red;color:white;font-weight:bold;}
.resultado{background:#1a1a1a;padding:15px;margin-top:15px;border-radius:10px;text-align:left;}
</style>
</head>

<body>

<div id="login" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#0f0f0f;display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:9999;">
  <h1 style="color:red;">BANNACH SENSI 🔥</h1>
  <input id="senha" type="password" placeholder="Digite a senha">
  <button onclick="entrar()">ENTRAR</button>
</div>

<div class="container">
<h2>🔥 GERADOR PRO EXTREMO 🔥</h2>

<select id="modo">
  <option value="mobile">📱 Mobile</option>
  <option value="mobilador">🖱️ Mobilador</option>
</select>

<select id="celular"></select>

<select id="sensi">
  <option value="baixa">Sensibilidade Baixa</option>
  <option value="media">Sensibilidade Média</option>
  <option value="alta">Sensibilidade Alta</option>
</select>

<div id="dpiBox">
<p>DPI: <span id="dpiValor">600</span></p>
<input type="range" min="300" max="800" value="600" id="dpi">
</div>

<p>Botão: <span id="botaoValor">50</span>%</p>
<input type="range" min="20" max="100" value="50" id="botao">

<div id="cursorBox">
<p>Cursor: <span id="cursorValor">50</span></p>
<input type="range" min="10" max="100" value="50" id="cursor">
</div>

<button onclick="gerar()">GERAR</button>
<button onclick="copiar()">COPIAR</button>

<div class="resultado" id="resultado"></div>
</div>

<script>

// LOGIN
const SENHA = "bannachsensipro";

function getDeviceId(){
  let id = localStorage.getItem("device_id");
  if(!id){
    id = Math.random().toString(36).substr(2, 9);
    localStorage.setItem("device_id", id);
  }
  return id;
}

function entrar(){
  var s = document.getElementById("senha").value;
  var device = getDeviceId();

  if(s === SENHA){
    let savedDevice = localStorage.getItem("device_autorizado");

    if(!savedDevice){
      localStorage.setItem("device_autorizado", device);
      liberar();
    } 
    else if(savedDevice === device){
      liberar();
    } 
    else {
      alert("Acesso bloqueado!");
    }

  } else {
    alert("Senha incorreta!");
  }
}

function liberar(){
  document.getElementById("login").style.display = "none";
  localStorage.setItem("logado","sim");
}

if(localStorage.getItem("logado") === "sim"){
  document.getElementById("login").style.display = "none";
}

// BASE
const baseCelulares = {
  "Samsung A10": 92,"Samsung A12": 95,"Samsung A13": 98,"Samsung A23 5G": 105,
  "Samsung A32": 108,"Samsung A34": 110,"Samsung A51": 107,"Samsung A54": 112,
  "Samsung A15 4G": 104,
  "Samsung A15 5G": 106,
  "Samsung S20 FE": 115,"Samsung S21": 118,

  "Moto G05": 102,"Moto G53": 110,"Redmi Note 9S": 108,

  "Motorola G23": 102,"Motorola G32": 104,"Motorola G52": 106,"Motorola G60": 108,
  "Redmi 9A": 90,"Redmi 10A": 93,"Redmi Note 10": 100,"Redmi Note 11": 105,
  "Redmi Note 12": 108,"Redmi Note 13 4G": 110,"Redmi 14C": 108,
  "POCO M3": 100,"POCO X3 Pro": 118,"POCO X5": 112,"POCO X6 Pro": 120,
  "POCO C75": 103,
  "iPhone XR": 110,"iPhone 11": 115,"iPhone 12": 118,"iPhone 13": 120
};

const select = document.getElementById("celular");

// MARCAS
const marcas = {"Samsung":[],"Motorola":[],"Xiaomi":[],"POCO":[],"iPhone":[]};

for(let cel in baseCelulares){
  let n = cel.toLowerCase();
  if(n.includes("samsung")) marcas["Samsung"].push(cel);
  else if(n.includes("moto")||n.includes("motorola")) marcas["Motorola"].push(cel);
  else if(n.includes("redmi")) marcas["Xiaomi"].push(cel);
  else if(n.includes("poco")) marcas["POCO"].push(cel);
  else if(n.includes("iphone")) marcas["iPhone"].push(cel);
}

for(let m in marcas){
  let g = document.createElement("optgroup");
  g.label = m;
  marcas[m].forEach(c=>{
    let o=document.createElement("option");
    o.textContent=c;
    g.appendChild(o);
  });
  select.appendChild(g);
}

// 🔥 DPI DINÂMICA REAL
function gerarDPI(sensi, celular){
  let base = baseCelulares[celular] || 100;

  let dpi;

  if(sensi === "baixa"){
    dpi = base * 3.5;
  }
  else if(sensi === "media"){
    dpi = base * 5;
  }
  else if(sensi === "alta"){
    dpi = base * 6.5;
  }
  else{
    dpi = base * 5;
  }

  if(dpi < 300) dpi = 300;
  if(dpi > 800) dpi = 800;

  return Math.round(dpi);
}

// 🔥 NOVO: HORIZONTAL E VERTICAL
function gerarHV(sensi){
  let h, v;

  if(sensi === "baixa"){
    h = random(110,150);
    v = random(200,260);
  }

  if(sensi === "media"){
    h = random(140,190);
    v = random(240,320);
  }

  if(sensi === "alta"){
    h = random(180,260);
    v = random(300,420);
  }

  return {horizontal:h, vertical:v};
}

// 🔥 RANDOM
function random(min, max){
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

// AUTO GERAR
function autoGerar(){
  let cel=select.value;
  let sensi=document.getElementById("sensi").value;
  if(!cel) return;

  let config=gerarMobile(sensi,cel);
  let dpiAuto=gerarDPI(sensi, cel);
  let hv = gerarHV(sensi);

  let html=`📱 ${cel}<br>🎚 ${sensi}<br><br>`;

  html+=`🎯 Horizontal:${hv.horizontal}<br>`;
  html+=`🎯 Vertical:${hv.vertical}<br><br>`;

  html+=`Geral:${config.geral}<br>RedDot:${config.redDot}<br>2x:${config.x2}<br>4x:${config.x4}<br>AWM:${config.awm}<br>Olhadinha:${config.olhadinha}<br><br>`;
  html+=`Auxílio: 100%<br>Anti Recuo: 100%<br>Precisão: 100%<br><br>`;
  html+=`DPI recomendada: ${dpiAuto}<br>`;
  html+=`DPI atual: ${dpi.value}<br>Cursor:${cursor.value}<br>Botão:${botao.value}`;

  resultado.innerHTML=html;
}

// EVENTOS
document.getElementById("sensi").addEventListener("change", autoGerar);
select.addEventListener("change", autoGerar);
dpi.addEventListener("input", autoGerar);
botao.addEventListener("input", autoGerar);
cursor.addEventListener("input", autoGerar);

dpi.oninput=()=>dpiValor.innerText=dpi.value;
botao.oninput=()=>botaoValor.innerText=botao.value;
cursor.oninput=()=>cursorValor.innerText=cursor.value;

// ORIGINAL
function gerarMobile(s,c){
  let base=baseCelulares[c]||100;
  if(s==="baixa") base-=10;
  if(s==="alta") base+=10;
  return{geral:base,redDot:base-3,x2:base-10,x4:base-18,awm:base-30,olhadinha:base+6};
}

function gerar(){
  autoGerar();
}

function copiar(){
  navigator.clipboard.writeText(resultado.innerText);
  alert("Copiado!");
}

</script>
</body>
</html>
