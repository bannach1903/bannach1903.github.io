<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador PRO Sensibilidade FF - Insano CAPA</title>
<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
  text-align:center;
}
.container{padding:20px;}
select, input{
  width:90%;
  margin:10px;
  padding:10px;
  border-radius:10px;
  border:none;
  font-size:16px;
}
button{
  width:90%;
  padding:15px;
  margin:10px;
  border:none;
  border-radius:10px;
  font-size:16px;
  font-weight:bold;
  background:red;
  color:white;
  cursor:pointer;
}
.resultado{
  background:#1a1a1a;
  padding:15px;
  margin-top:15px;
  border-radius:10px;
  text-align:left;
}
</style>
</head>
<body>
<div class="container">

<h2>🔥 GERADOR PRO DE SENSI FF - NÍVEL INSANO 🔥</h2>

<select id="modo">
  <option value="mobile">📱 Mobile Normal</option>
  <option value="mobilador">🚀 Mobilador (GG Mouse Pro)</option>
</select>

<select id="celular"></select>

<select id="estilo">
  <option value="equilibrado">⚖️ Rush Equilibrado</option>
  <option value="capa">🎯 Mais Capa (HS)</option>
</select>

<p>DPI: <span id="dpiValor">600</span></p>
<input type="range" min="300" max="800" value="600" id="dpi">

<p>Botão: <span id="botaoValor">50</span>%</p>
<input type="range" min="20" max="100" value="50" id="botao">

<p>Cursor: <span id="cursorValor">50</span></p>
<input type="range" min="10" max="100" value="50" id="cursor">

<select id="bufferGPU">
  <option value="8192KB">Buffer GPU: 8.192KB</option>
  <option value="16384KB">Buffer GPU: 16.384KB</option>
  <option value="32768KB">Buffer GPU: 32.768KB</option>
  <option value="65536KB">Buffer GPU: 65.536KB</option>
</select>

<select id="bufferLogger">
  <option value="60KB">Buffer Logger: 60KB</option>
  <option value="256KB">Buffer Logger: 256KB</option>
  <option value="1MB">Buffer Logger: 1MB</option>
  <option value="4MB">Buffer Logger: 4MB</option>
</select>

<button onclick="gerar()">GERAR</button>
<button onclick="copiar()">COPIAR</button>

<div class="resultado" id="resultado">
Seu resultado aparecerá aqui...
</div>

</div>

<script>
window.onload = function(){

const celulares = [
  {nome:"Samsung A10", tipo:"fraco"}, {nome:"Samsung A12", tipo:"fraco"},
  {nome:"Samsung A13", tipo:"fraco"}, {nome:"Samsung A03", tipo:"fraco"},
  {nome:"Moto E7", tipo:"fraco"}, {nome:"Moto E13", tipo:"fraco"},
  {nome:"Moto G8 Play", tipo:"fraco"}, {nome:"Redmi 9A", tipo:"fraco"},
  {nome:"Redmi 10A", tipo:"fraco"}, {nome:"Realme C11", tipo:"fraco"},
  {nome:"Realme C30", tipo:"fraco"}, {nome:"Infinix Hot 12", tipo:"fraco"},
  {nome:"Tecno Spark 9", tipo:"fraco"}, {nome:"Galaxy M02", tipo:"fraco"},

  {nome:"Motorola G23", tipo:"medio"}, {nome:"Moto G32", tipo:"medio"},
  {nome:"Moto G52", tipo:"medio"}, {nome:"Moto G60", tipo:"medio"},
  {nome:"Moto G84", tipo:"medio"}, {nome:"Samsung A32", tipo:"medio"},
  {nome:"Samsung A34", tipo:"medio"}, {nome:"Samsung A51", tipo:"medio"},
  {nome:"Samsung A54", tipo:"medio"}, {nome:"Samsung A25 5G", tipo:"medio"},
  {nome:"Samsung A15 5G", tipo:"medio"}, {nome:"Redmi Note 10", tipo:"medio"},
  {nome:"Redmi Note 11", tipo:"medio"}, {nome:"Redmi Note 12", tipo:"medio"},
  {nome:"Redmi Note 13 4G", tipo:"medio"}, {nome:"Redmi Note 13 5G", tipo:"medio"},
  {nome:"POCO M3", tipo:"medio"}, {nome:"POCO M5", tipo:"medio"},
  {nome:"POCO X5", tipo:"medio"}, {nome:"Realme 11", tipo:"medio"},
  {nome:"Realme 12", tipo:"medio"}, {nome:"Galaxy M12", tipo:"medio"},

  {nome:"POCO X3 Pro", tipo:"forte"}, {nome:"POCO X5 Pro", tipo:"forte"},
  {nome:"POCO X6 Pro", tipo:"forte"}, {nome:"POCO F4", tipo:"forte"},
  {nome:"POCO F5", tipo:"forte"}, {nome:"Samsung S20 FE", tipo:"forte"},
  {nome:"Samsung S21", tipo:"forte"}, {nome:"Samsung S22", tipo:"forte"},
  {nome:"Samsung S23", tipo:"forte"}, {nome:"Samsung S24", tipo:"forte"},
  {nome:"iPhone XR", tipo:"forte"}, {nome:"iPhone 11", tipo:"forte"},
  {nome:"iPhone 12", tipo:"forte"}, {nome:"iPhone 13", tipo:"forte"},
  {nome:"iPhone 14", tipo:"forte"}, {nome:"iPhone 15", tipo:"forte"},
  {nome:"ROG Phone 6", tipo:"forte"}, {nome:"ROG Phone 7", tipo:"forte"},
  {nome:"Asus Zenfone 10", tipo:"forte"}, {nome:"Realme GT 3", tipo:"forte"},
  {nome:"Redmi K60", tipo:"forte"}, {nome:"Xiaomi 13 Pro", tipo:"forte"},
  {nome:"OnePlus 12", tipo:"forte"}
];

const selectCelular = document.getElementById("celular");
celulares.forEach(cel=>{
  let option = document.createElement("option");
  option.value = cel.tipo;
  option.textContent =
    cel.tipo==="fraco"?"🔻 "+cel.nome:
    cel.tipo==="medio"?"⚖️ "+cel.nome:
    "🚀 "+cel.nome;
  selectCelular.appendChild(option);
});

const dpi = document.getElementById("dpi");
const botao = document.getElementById("botao");
const cursor = document.getElementById("cursor");
const dpiValor = document.getElementById("dpiValor");
const botaoValor = document.getElementById("botaoValor");
const cursorValor = document.getElementById("cursorValor");

dpi.oninput = ()=> dpiValor.innerText = dpi.value;
botao.oninput = ()=> botaoValor.innerText = botao.value;
cursor.oninput = ()=> cursorValor.innerText = cursor.value;

window.gerar = function(){
  let tipo = selectCelular.value;
  let estilo = document.getElementById("estilo").value;
  let modo = document.getElementById("modo").value;
  let dpiVal = parseInt(dpi.value);
  let botaoVal = parseInt(botao.value);
  let cursorVal = parseInt(cursor.value);

  let base = tipo==="fraco"?88: tipo==="medio"?100:110;
  let ajusteDPI = (dpiVal - 500)/25;
  let ajusteCursor = (cursorVal - 50)/6;
  let ajusteBotao = (botaoVal - 50)/12;
  let geral = base + ajusteDPI + ajusteCursor - ajusteBotao;

  let mobiladorGeral = modo==="mobilador"?Math.min(Math.max(geral/4,0),25):geral;

  let redDot = mobiladorGeral - 2;
  let x2 = mobiladorGeral - 8;
  let x4 = mobiladorGeral - 15;
  let awm = mobiladorGeral - 25;
  let olhadinha = mobiladorGeral + 6;

  function limitar(v){ return Math.round(Math.max(0,Math.min(v,200))); }
  geral=limitar(geral); redDot=limitar(redDot); x2=limitar(x2);
  x4=limitar(x4); awm=limitar(awm); olhadinha=limitar(olhadinha);

  let bufferGPU = document.getElementById("bufferGPU").value;
  let bufferLogger = document.getElementById("bufferLogger").value;

  let antiRecuo = 100;
  let auxMira = 100;
  let estabilidade = 100;

  let escalaJanela = "0.5x";
  let escalaTransicao = "0.5x";
  let escalaAnimador = "0x";

  let dpiMouse = modo==="mobilador"?Math.round(1000 + (dpiVal-500)/2):0;
  let horizontal = modo==="mobilador"?280:0;
  let vertical = modo==="mobilador"?310:0;

  document.getElementById("resultado").innerHTML=`
    🔥 RESULTADO CALIBRADO 🔥<br><br>
    Estilo: ${estilo} <br>
    Modo: ${modo} <br>
    DPI Jogo: ${dpiVal} <br><br>

    🎯 Geral: ${geral} <br>
    🔴 RedDot: ${redDot} <br>
    🔍 2x: ${x2} <br>
    🔭 4x: ${x4} <br>
    🎯 AWM: ${awm} <br>
    👁️ Olhadinha: ${olhadinha} <br><br>

    ⚙️ Botão: ${botaoVal}%<br>
    ⚙️ Cursor: ${cursorVal}<br>
    ⚙️ Anti Recuo: ${antiRecuo}%<br>
    ⚙️ Auxílio de Mira: ${auxMira}%<br>
    ⚙️ Estabilidade: ${estabilidade}%<br>
    ⚙️ Buffer GPU: ${bufferGPU}<br>
    ⚙️ Buffer Logger: ${bufferLogger}<br>
    ⚙️ Escala Janela: ${escalaJanela}<br>
    ⚙️ Escala Transição: ${escalaTransicao}<br>
    ⚙️ Escala Animador: ${escalaAnimador}<br>
    ${modo==="mobilador"?`<br>🖱️ GG Mouse Pro<br>DPI Mouse: ${dpiMouse}<br>Horizontal: ${horizontal}<br>Vertical: ${vertical}`:""}
  `;
}

window.copiar = function(){
  let texto = document.getElementById("resultado").innerText;
  navigator.clipboard.writeText(texto);
  alert("Copiado!");
}

}
</script>
</body>
</html>
