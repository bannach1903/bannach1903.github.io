<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de Sensibilidade FF</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
  text-align:center;
}

.container{
  padding:20px;
}

select, input{
  width:90%;
  margin:10px;
  padding:10px;
  border-radius:10px;
  border:none;
  font-size:16px;
}

button{
  width:90%;
  padding:15px;
  margin:10px;
  border:none;
  border-radius:10px;
  font-size:16px;
  font-weight:bold;
  background:red;
  color:white;
}

.resultado{
  background:#1a1a1a;
  padding:15px;
  margin-top:15px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>🔥 GERADOR DE SENSI FF 🔥</h2>

<select id="celular">
  <option value="medio">Selecione seu celular</option>
  <option value="fraco">Samsung A10</option>
  <option value="medio">Motorola G23</option>
  <option value="medio">Redmi Note 13 4G</option>
  <option value="forte">iPhone 11</option>
  <option value="forte">POCO X5</option>
</select>

<p>DPI: <span id="dpiValor">600</span></p>
<input type="range" min="300" max="800" value="600" id="dpi">

<p>Botão de Disparo: <span id="botaoValor">50</span>%</p>
<input type="range" min="20" max="100" value="50" id="botao">

<p>Velocidade do Cursor: <span id="cursorValor">50</span></p>
<input type="range" min="10" max="100" value="50" id="cursor">

<button onclick="gerar()">GERAR</button>
<button onclick="copiar()">COPIAR</button>

<div class="resultado" id="resultado">
Seu resultado aparecerá aqui...
</div>

</div>

<script>

// atualizar valores na tela
dpi.oninput = () => dpiValor.innerText = dpi.value
botao.oninput = () => botaoValor.innerText = botao.value
cursor.oninput = () => cursorValor.innerText = cursor.value

function gerar(){

  let tipo = document.getElementById("celular").value
  let dpiVal = parseInt(dpi.value)
  let botaoVal = parseInt(botao.value)
  let cursorVal = parseInt(cursor.value)

  // BASE POR APARELHO
  let base

  if(tipo === "fraco"){
    base = 120
  }else if(tipo === "medio"){
    base = 140
  }else{
    base = 160
  }

  // CALCULO INTELIGENTE
  let geral = base + (dpiVal/10) + (cursorVal/5)
  let redDot = geral - 5
  let x2 = geral - 15
  let x4 = geral - 25
  let awm = geral - 35
  let olhadinha = geral + 10

  // AJUSTE PELO BOTÃO
  geral -= botaoVal/10
  redDot -= botaoVal/12

  // ARREDONDAR
  geral = Math.round(geral)
  redDot = Math.round(redDot)
  x2 = Math.round(x2)
  x4 = Math.round(x4)
  awm = Math.round(awm)
  olhadinha = Math.round(olhadinha)

  document.getElementById("resultado").innerHTML = `
  🔥 RESULTADO 🔥<br><br>
  DPI: ${dpiVal} <br>
  Geral: ${geral} <br>
  RedDot: ${redDot} <br>
  2x: ${x2} <br>
  4x: ${x4} <br>
  AWM: ${awm} <br>
  Olhadinha: ${olhadinha} <br>
  Botão: ${botaoVal}% 
  `
}

function copiar(){
  let texto = document.getElementById("resultado").innerText
  navigator.clipboard.writeText(texto)
  alert("Copiado!")
}

</script>

</body>
</html>
