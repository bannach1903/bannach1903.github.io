<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador PRO Sensibilidade FF</title>
<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
  text-align:center;
}
.container{padding:20px;}
select, input{
  width:90%;
  margin:10px;
  padding:10px;
  border-radius:10px;
  border:none;
  font-size:16px;
}
button{
  width:90%;
  padding:15px;
  margin:10px;
  border:none;
  border-radius:10px;
  font-size:16px;
  font-weight:bold;
  background:red;
  color:white;
}
.resultado{
  background:#1a1a1a;
  padding:15px;
  margin-top:15px;
  border-radius:10px;
}
h2{margin-bottom:0;}
</style>
</head>
<body>
<div class="container">

<h2>🔥 GERADOR PRO DE SENSI FF 🔥</h2>

<select id="celular"></select>

<select id="estilo">
  <option value="equilibrado">⚖️ Rush Equilibrado</option>
  <option value="capa">🎯 Mais Capa (HS)</option>
</select>

<p>DPI: <span id="dpiValor">600</span></p>
<input type="range" min="300" max="800" value="600" id="dpi">

<p>Botão: <span id="botaoValor">50</span>%</p>
<input type="range" min="20" max="100" value="50" id="botao">

<p>Cursor: <span id="cursorValor">50</span></p>
<input type="range" min="10" max="100" value="50" id="cursor">

<button onclick="gerar()">GERAR</button>
<button onclick="copiar()">COPIAR</button>

<div class="resultado" id="resultado">
Seu resultado aparecerá aqui...
</div>

</div>

<script>
// ----------------- CELULARES -----------------
const celulares = [
  {nome:"Samsung A10", tipo:"fraco"},
  {nome:"Samsung A12", tipo:"fraco"},
  {nome:"Moto G23", tipo:"medio"},
  {nome:"Redmi Note 13 4G", tipo:"medio"},
  {nome:"POCO X3 Pro", tipo:"forte"},
  {nome:"iPhone 14", tipo:"forte"},
  {nome:"Samsung S21", tipo:"forte"},
  {nome:"ROG Phone 7", tipo:"forte"}
];

// Carregar select
const selectCelular = document.getElementById("celular");
celulares.forEach(cel=>{
  let option = document.createElement("option");
  option.value = cel.tipo; // mantém o tipo
  option.textContent = cel.tipo==="fraco"?"🔻 "+cel.nome:cel.tipo==="medio"?"⚖️ "+cel.nome:"🚀 "+cel.nome;
  selectCelular.appendChild(option);
});

// Atualizar sliders
const dpi = document.getElementById("dpi");
const botao = document.getElementById("botao");
const cursor = document.getElementById("cursor");
dpi.oninput = ()=> dpiValor.innerText = dpi.value;
botao.oninput = ()=> botaoValor.innerText = botao.value;
cursor.oninput = ()=> cursorValor.innerText = cursor.value;

// ----------------- GERADOR PRO -----------------
function gerar(){
  let tipo = selectCelular.value; // usar selectCelular aqui
  let estilo = document.getElementById("estilo").value;
  let dpiVal = parseInt(dpi.value);
  let botaoVal = parseInt(botao.value);
  let cursorVal = parseInt(cursor.value);

  let base = tipo==="fraco"?90: tipo==="medio"?105:115;
  let ajusteDPI = (dpiVal - 500)/15;
  let ajusteCursor = (cursorVal - 50)/4;
  let ajusteBotao = (botaoVal - 50)/8;
  let geral = base + ajusteDPI + ajusteCursor - ajusteBotao;
  if(estilo==="capa") geral-=5;

  let redDot = geral-3;
  let x2 = geral-10;
  let x4 = geral-18;
  let awm = geral-28;
  let olhadinha = geral+8;
  if(estilo==="capa"){ redDot-=2; x2-=3; x4-=5 }

  function limitar(v){ if(v<0)return 0; if(v>200)return 200; return Math.round(v) }
  geral=limitar(geral);
  redDot=limitar(redDot);
  x2=limitar(x2);
  x4=limitar(x4);
  awm=limitar(awm);
  olhadinha=limitar(olhadinha);

  document.getElementById("resultado").innerHTML=`
    🔥 RESULTADO PRO 🔥<br><br>
    Estilo: ${estilo} <br>
    DPI: ${dpiVal} <br>
    Geral: ${geral} <br>
    RedDot: ${redDot} <br>
    2x: ${x2} <br>
    4x: ${x4} <br>
    AWM: ${awm} <br>
    Olhadinha: ${olhadinha} <br>
    Botão: ${botaoVal}%
  `;
}

function copiar(){ 
  navigator.clipboard.writeText(document.getElementById("resultado").innerText); 
  alert("Copiado!") 
}
